<!DOCTYPE html>
<html>

<head>

<title>JetTrend Market Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.topbar{
background:#111;
padding:10px 20px;
border-bottom:1px solid #333;
display:flex;
justify-content:space-between;
font-weight:bold;
}

.layout{
display:grid;
grid-template-columns: 1fr 350px;
grid-template-rows:auto auto 1fr;
gap:10px;
padding:10px;
}

.panel{
background:#141414;
padding:12px;
border-radius:4px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c;}
.sell{color:#ff4d4d;}

#chart{
height:450px;
margin-top:10px;
}

.alert{
background:#1a1a1a;
padding:8px;
margin-bottom:8px;
border-radius:4px;
}

.heatmap{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:5px;
}

.heat{
padding:20px;
text-align:center;
border-radius:4px;
font-weight:bold;
}

.green{background:#006b3f;}
.red{background:#7a0000;}

.ticker{
display:flex;
gap:20px;
}

.mover{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #222;
}

</style>

</head>

<body>

<div class="topbar">

<div class="ticker" id="ticker"></div>

<div>
JetTrend Market Dashboard
</div>

</div>

<div class="layout">

<div class="panel">

<h3>Market Heatmap</h3>

<div id="heatmap" class="heatmap"></div>

</div>

<div class="panel">

<h3>Alerts</h3>

<div id="alerts"></div>

</div>

<div class="panel">

<h3>Stock Screener</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

</div>

<div class="panel">

<h3>Top Movers</h3>

<div id="gainers"></div>
<div id="losers"></div>

</div>

</div>

<script>

const symbols=[
"AAPL","NVDA","TSLA","AMD","META",
"MSFT","SPY","QQQ","AMZN","GOOGL",
"NFLX","AVGO","TSM","SHOP","COIN"
]

let lastPrices={}

async function getPrice(symbol){

try{

const res=await fetch(
`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`
)

const data=await res.json()

if(!data.price) return null

return parseFloat(data.price)

}catch{

return null

}

}

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
style:"1",
width:"100%",
height:450
})

}

function addAlert(text){

let div=document.createElement("div")
div.className="alert"
div.innerText=text

document.getElementById("alerts").prepend(div)

}

function getSignal(price,last){

if(!last) return "NEUTRAL"

if(price>last) return "BUY"

if(price<last) return "SELL"

return "NEUTRAL"

}

function addHeat(symbol,price,last){

let heat=document.getElementById("heatmap")

let box=document.createElement("div")

let change=price-last

box.className="heat "+(change>=0?"green":"red")

box.innerText=symbol

heat.appendChild(box)

}

function buildTicker(data){

let ticker=document.getElementById("ticker")

ticker.innerHTML=""

for(let s of ["SPY","QQQ","DIA"]){

let div=document.createElement("div")

div.innerText=s+" "+(data[s]??"-")

ticker.appendChild(div)

}

}

function buildMovers(changes){

let sorted=[...changes].sort((a,b)=>b.change-a.change)

let gainers=document.getElementById("gainers")
let losers=document.getElementById("losers")

gainers.innerHTML="<b>Top Gainers</b>"
losers.innerHTML="<b>Top Losers</b>"

sorted.slice(0,5).forEach(s=>{

let div=document.createElement("div")
div.className="mover"
div.innerHTML=`${s.symbol} <span class="buy">${s.change.toFixed(2)}</span>`
gainers.appendChild(div)

})

sorted.slice(-5).forEach(s=>{

let div=document.createElement("div")
div.className="mover"
div.innerHTML=`${s.symbol} <span class="sell">${s.change.toFixed(2)}</span>`
losers.appendChild(div)

})

}

async function buildScanner(){

let table=document.getElementById("scanner")
let heat=document.getElementById("heatmap")

table.innerHTML=""
heat.innerHTML=""

let priceData={}
let changes=[]

for(let s of symbols){

let price=await getPrice(s)

priceData[s]=price

let tr=document.createElement("tr")

let sym=document.createElement("td")
sym.innerText=s
sym.className="symbol"
sym.onclick=()=>loadChart(s)

let priceCell=document.createElement("td")
priceCell.innerText=price?price.toFixed(2):"-"

let signalCell=document.createElement("td")

let signal=getSignal(price,lastPrices[s])

signalCell.innerText=signal

if(signal==="BUY") signalCell.className="buy"
if(signal==="SELL") signalCell.className="sell"

tr.appendChild(sym)
tr.appendChild(priceCell)
tr.appendChild(signalCell)

table.appendChild(tr)

if(price && lastPrices[s]){

let change=price-lastPrices[s]

changes.push({symbol:s,change})

if(change!==0){

addAlert(s+" moved to "+price.toFixed(2))

}

addHeat(s,price,lastPrices[s])

}

lastPrices[s]=price

}

buildTicker(priceData)
buildMovers(changes)

}

buildScanner()

setInterval(buildScanner,20000)

loadChart("AAPL")

</script>

</body>

</html>

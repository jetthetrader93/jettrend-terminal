<!DOCTYPE html>

<html>
<head>

<title>JetTrend Market Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{
display:grid;
grid-template-columns:70px 1fr 300px;
grid-template-rows:60px 1fr;
height:100vh;
}

.sidebar{
grid-row:1/3;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:18px;
opacity:.7;
cursor:pointer;
}

.sidebar div:hover{
opacity:1;
}

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #333;
font-weight:bold;
}

.main{
padding:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.right{
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

.alert{
background:#1a1a1a;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

#chart{
margin-top:20px;
height:500px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>📈</div>
<div>⚙️</div>
</div>

<div class="topbar">
JetTrend Market Terminal
</div>

<div class="main">

<h3>Market Scanner</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

</div>

<div class="right">

<h3>Alerts</h3>

<div id="alerts"></div>

</div>

</div>

<script>

const API="54a78d716fd742ee8eaf5eb3aa2b2b58"

const symbols=[
"AAPL:NASDAQ",
"NVDA:NASDAQ",
"TSLA:NASDAQ",
"AMD:NASDAQ",
"META:NASDAQ",
"MSFT:NASDAQ",
"SPY:NYSE",
"QQQ:NASDAQ"
]

async function getPrice(symbol){

const url=`https://api.twelvedata.com/price?symbol=${symbol}&apikey=${API}`

try{

const res=await fetch(url)
const data=await res.json()

return parseFloat(data.price)

}catch{

return null

}

}

function addAlert(text){

let div=document.createElement("div")
div.className="alert"
div.innerText=text

document.getElementById("alerts").prepend(div)

}

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
style:"1",
width:"100%",
height:500
})

}

async function buildScanner(){

let table=document.getElementById("scanner")

table.innerHTML=""

for(let s of symbols){

let price=await getPrice(s)

let tr=document.createElement("tr")

let sym=document.createElement("td")
sym.innerText=s.split(":")[0]
sym.className="symbol"
sym.onclick=()=>loadChart(s)

let priceCell=document.createElement("td")
priceCell.innerText=price ?? "-"

let sigCell=document.createElement("td")
sigCell.innerText=price ? "ACTIVE" : "NEUTRAL"

tr.appendChild(sym)
tr.appendChild(priceCell)
tr.appendChild(sigCell)

table.appendChild(tr)

if(price){
addAlert(s.split(":")[0]+" price updated")
}

}

}

buildScanner()

setInterval(buildScanner,30000)

</script>

</body>
</html>

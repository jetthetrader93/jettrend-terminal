<!DOCTYPE html>
<html>
<head>

<title>JetTrend AI Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{
display:grid;
grid-template-columns:70px 1fr 320px;
grid-template-rows:60px 1fr;
height:100vh;
}

.sidebar{
grid-row:1/3;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:18px;
opacity:.7;
}

.sidebar div:hover{
opacity:1;
}

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
font-weight:bold;
border-bottom:1px solid #333;
}

.main{
padding:15px;
overflow:auto;
}

.cards{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
background:#141414;
padding:15px;
border-radius:6px;
flex:1;
}

.card h3{
margin:0;
font-size:14px;
color:#aaa;
}

.card div{
font-size:22px;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{
color:#00ff9c;
font-weight:bold;
}

.sell{
color:#ff4d4d;
font-weight:bold;
}

.flow{
color:#f0c330;
}

.news{
background:#111;
padding:10px;
border-radius:6px;
margin-bottom:15px;
}

.news a{
color:#00ff9c;
text-decoration:none;
display:block;
margin-bottom:5px;
}

.right{
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

.alert{
background:#1a1a1a;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

#chart{
margin-top:15px;
height:500px;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>⚡</div>
<div>⚙️</div>
</div>

<div class="topbar">
JetTrend AI Terminal
</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>Market Sentiment</h3>
<div id="sentiment">Neutral</div>
</div>

<div class="card">
<h3>AI Signal Strength</h3>
<div id="strength">0</div>
</div>

<div class="card">
<h3>Momentum Ratio</h3>
<div id="momentum">0</div>
</div>

</div>

<table>

<thead>
<tr>
<th>Time</th>
<th>Symbol</th>
<th>Price</th>
<th>AI Signal</th>
<th>Trend Strength</th>
<th>Flow</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div class="news" id="news">
<b>Market News</b>
</div>

<div id="chart"></div>

</div>

<div class="right">

<h3>Alerts</h3>
<div id="alerts"></div>

</div>

</div>

<script>

const symbols=["AAPL","NVDA","TSLA","AMD","META"]

const history={}
symbols.forEach(s=>history[s]=[])

async function getPrice(symbol){

try{

const res = await fetch(
`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`
)

const data = await res.json()

if(!data || !data.price) return null

const price=Number(data.price)

if(isNaN(price)) return null

return price

}catch{

return null

}

}

function ema(data,period){

let k=2/(period+1)
let ema=data[0]

for(let i=1;i<data.length;i++)
ema=data[i]*k+ema*(1-k)

return ema

}

function trendStrength(e9,e21){

let diff=Math.abs(e9-e21)

return diff.toFixed(2)

}

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
style:"1",
width:"100%",
height:500

})

}

function addAlert(text){

let div=document.createElement("div")
div.className="alert"
div.innerText=text

document.getElementById("alerts").prepend(div)

}

function updateNews(){

const headlines=[
"Fed signals possible rate cuts later this year",
"Nvidia leads AI stock rally",
"Tesla volatility increases on delivery numbers",
"Tech sector outperforming market today",
"Oil prices impacting energy stocks"
]

let news=document.getElementById("news")
news.innerHTML="<b>Market News</b>"

headlines.forEach(h=>{

let a=document.createElement("a")
a.innerText="• "+h
news.appendChild(a)

})

}

async function buildScanner(){

let table=document.getElementById("scanner")

table.innerHTML=""

let buyCount=0
let sellCount=0

for(let s of symbols){

let price=await getPrice(s)

let time=new Date().toLocaleTimeString()

if(price){
history[s].push(price)
}

if(history[s].length<25)
continue

let e9=ema(history[s].slice(-9),9)
let e21=ema(history[s].slice(-21),21)

let signal="NEUTRAL"

if(e9>e21){
signal="BUY"
buyCount++
}

if(e9<e21){
signal="SELL"
sellCount++
}

let strength=trendStrength(e9,e21)

const flows=["Sweep","Block","Split","Momentum"]
let flow=flows[Math.floor(Math.random()*flows.length)]

let tr=document.createElement("tr")

let t=document.createElement("td")
t.innerText=time

let sym=document.createElement("td")
sym.innerText=s
sym.className="symbol"
sym.onclick=()=>loadChart(s)

let p=document.createElement("td")
p.innerText=price?price.toFixed(2):"-"

let sig=document.createElement("td")
sig.innerText=signal
sig.className=signal=="BUY"?"buy":signal=="SELL"?"sell":""

let st=document.createElement("td")
st.innerText=strength

let f=document.createElement("td")
f.innerText=flow
f.className="flow"

tr.appendChild(t)
tr.appendChild(sym)
tr.appendChild(p)
tr.appendChild(sig)
tr.appendChild(st)
tr.appendChild(f)

table.appendChild(tr)

if(signal!="NEUTRAL")
addAlert(s+" "+signal+" signal")

}

let sentiment="Neutral"

if(buyCount>sellCount) sentiment="Bullish"
if(sellCount>buyCount) sentiment="Bearish"

document.getElementById("sentiment").innerText=sentiment
document.getElementById("strength").innerText=buyCount
document.getElementById("momentum").innerText=(buyCount-sellCount)

}

updateNews()

buildScanner()

setInterval(buildScanner,20000)

</script>

</body>
</html>

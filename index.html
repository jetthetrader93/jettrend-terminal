<!DOCTYPE html>
<html>

<head>

<title>JetTrend Pro Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.topbar{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #333;
}

button{
background:#222;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

.layout{
display:grid;
grid-template-columns:300px 1fr 350px;
grid-template-rows:auto auto 1fr;
gap:10px;
padding:10px;
height:calc(100vh - 50px);
}

.panel{
background:#141414;
padding:10px;
border-radius:5px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
color:#aaa;
border-bottom:1px solid #333;
padding:8px;
}

td{
border-bottom:1px solid #222;
padding:8px;
}

.symbol{
cursor:pointer;
font-weight:bold;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c}
.sell{color:#ff4d4d}

.heatmap{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:4px;
}

.heat{
padding:18px;
text-align:center;
font-weight:bold;
border-radius:4px;
}

.green{background:#006b3f}
.red{background:#7a0000}

#chart{
height:400px;
}

.multi{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.chartbox{
height:300px;
}

.ticker{
display:flex;
gap:15px;
font-size:14px;
}

.alert{
background:#1f1f1f;
padding:6px;
margin-bottom:6px;
border-radius:3px;
}

</style>

</head>

<body>

<div class="topbar">

<div id="ticker" class="ticker"></div>

<div>
JetTrend Pro Terminal
<button onclick="toggleTheme()">Theme</button>
</div>

</div>

<div class="layout">

<div class="panel">

<h3>Watchlist</h3>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
</tr>
</thead>

<tbody id="watchlist"></tbody>

</table>

</div>

<div class="panel">

<h3>Finviz Heatmap</h3>

<div id="heatmap" class="heatmap"></div>

</div>

<div class="panel">

<h3>Alerts</h3>

<div id="alerts"></div>

</div>

<div class="panel">

<h3>Sector Heatmap</h3>

<div id="sectors" class="heatmap"></div>

</div>

<div class="panel">

<h3>Charts</h3>

<div id="chart"></div>

<div class="multi">

<div id="chart2" class="chartbox"></div>
<div id="chart3" class="chartbox"></div>

</div>

</div>

<div class="panel">

<h3>Top Movers</h3>

<div id="gainers"></div>
<div id="losers"></div>

<h3>Scanners</h3>

<div id="scanners"></div>

</div>

</div>

<script>

const symbols=[
"AAPL","NVDA","TSLA","AMD","META",
"MSFT","SPY","QQQ","AMZN","GOOGL",
"NFLX","AVGO","TSM","COIN","SHOP"
]

let lastPrices={}

async function getPrice(symbol){

const res=await fetch(
`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`
)

const data=await res.json()

return parseFloat(data.price)

}

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:400
})

}

function loadMultiCharts(){

new TradingView.widget({
container_id:"chart2",
symbol:"SPY",
interval:"5",
theme:"dark",
width:"100%",
height:300
})

new TradingView.widget({
container_id:"chart3",
symbol:"QQQ",
interval:"5",
theme:"dark",
width:"100%",
height:300
})

}

function addAlert(text){

let div=document.createElement("div")
div.className="alert"
div.innerText=text

document.getElementById("alerts").prepend(div)

}

function signal(price,last){

if(!last)return "NEUTRAL"
if(price>last)return "BUY"
if(price<last)return "SELL"
return "NEUTRAL"

}

function rsiSignal(price,last){

let rsi=Math.random()*100

if(rsi>70)return "SELL"
if(rsi<30)return "BUY"
return "NEUTRAL"

}

function volumeSpike(){

return Math.random()>0.85

}

function vwapSignal(){

return Math.random()>0.5?"BUY":"SELL"

}

function buildTicker(data){

let div=document.getElementById("ticker")

div.innerHTML=""

for(let s of ["SPY","QQQ","DIA"]){

let d=document.createElement("div")
d.innerText=s+" "+data[s]
div.appendChild(d)

}

}

function buildHeat(symbol,price,last){

let box=document.createElement("div")

let change=price-last

box.className="heat "+(change>=0?"green":"red")

box.innerText=symbol

document.getElementById("heatmap").appendChild(box)

}

function buildSectors(){

const sectors=[
"Tech","Energy","Finance","Healthcare","Retail",
"AI","Semiconductors","Cloud","EV","Crypto"
]

let div=document.getElementById("sectors")

div.innerHTML=""

for(let s of sectors){

let box=document.createElement("div")

box.className="heat "+(Math.random()>0.5?"green":"red")

box.innerText=s

div.appendChild(box)

}

}

async function build(){

let watch=document.getElementById("watchlist")
let heat=document.getElementById("heatmap")

watch.innerHTML=""
heat.innerHTML=""

let prices={}
let movers=[]

for(let s of symbols){

let price=await getPrice(s)

prices[s]=price

let tr=document.createElement("tr")

let sym=document.createElement("td")
sym.innerText=s
sym.className="symbol"
sym.onclick=()=>loadChart(s)

let p=document.createElement("td")
p.innerText=price.toFixed(2)

let sig=document.createElement("td")

let ai=signal(price,lastPrices[s])

sig.innerText=ai

if(ai==="BUY")sig.className="buy"
if(ai==="SELL")sig.className="sell"

tr.appendChild(sym)
tr.appendChild(p)
tr.appendChild(sig)

watch.appendChild(tr)

if(lastPrices[s]){

let change=price-lastPrices[s]

movers.push({symbol:s,change})

buildHeat(s,price,lastPrices[s])

if(volumeSpike())
addAlert(s+" volume spike")

if(rsiSignal(price,lastPrices[s])==="BUY")
addAlert(s+" RSI oversold")

if(vwapSignal()==="BUY")
addAlert(s+" VWAP breakout")

}

lastPrices[s]=price

}

buildTicker(prices)

buildMovers(movers)

buildSectors()

}

function buildMovers(movers){

let sorted=[...movers].sort((a,b)=>b.change-a.change)

let gain=document.getElementById("gainers")
let lose=document.getElementById("losers")

gain.innerHTML="<b>Top Gainers</b>"
lose.innerHTML="<b>Top Losers</b>"

sorted.slice(0,5).forEach(s=>{

gain.innerHTML+=`<div class="buy">${s.symbol} ${s.change.toFixed(2)}</div>`

})

sorted.slice(-5).forEach(s=>{

lose.innerHTML+=`<div class="sell">${s.symbol} ${s.change.toFixed(2)}</div>`

})

}

function toggleTheme(){

if(document.body.style.background=="white"){

document.body.style.background="#0b0b0b"
document.body.style.color="white"

}else{

document.body.style.background="white"
document.body.style.color="black"

}

}

build()

setInterval(build,20000)

loadChart("AAPL")

loadMultiCharts()

</script>

</body>
</html>

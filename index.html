<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0b0b;
color:#eee;
}

/* GRID */

.container{
display:grid;
grid-template-columns:70px 1fr 320px;
grid-template-rows:60px 40px 1fr;
height:100vh;
}

/* SIDEBAR */

.sidebar{
grid-row:1/4;
background:#111;
padding-top:20px;
text-align:center;
}

.sidebar div{
padding:18px;
opacity:.6;
cursor:pointer;
}

.sidebar div:hover{
opacity:1;
color:#00ff9c;
}

/* HEADER */

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
font-weight:600;
border-bottom:1px solid #222;
}

/* TICKER */

.ticker{
grid-column:2/4;
background:#0f0f0f;
overflow:hidden;
border-bottom:1px solid #222;
}

.ticker span{
padding:10px 25px;
display:inline-block;
color:#00ff9c;
}

/* MAIN */

.main{
padding:15px;
overflow:auto;
}

/* METERS */

.meters{
display:flex;
gap:20px;
margin-bottom:20px;
}

.meter{
text-align:center;
}

.gauge{
width:90px;
height:90px;
border-radius:50%;
background:conic-gradient(#00ff9c var(--value),#222 var(--value));
margin:auto;
}

.meterLabel{
margin-top:8px;
font-size:12px;
color:#aaa;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #222;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #1a1a1a;
}

.symbol{
font-weight:600;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c;}
.sell{color:#ff4d4d;}
.prob{color:#7fd3ff;}
.flow{color:#f0c330;}

/* RIGHT PANEL */

.right{
background:#141414;
border-left:1px solid #222;
padding:15px;
overflow:auto;
}

.panel{
margin-bottom:25px;
}

/* ALERT */

.alert{
background:#1a1a1a;
padding:8px;
margin-bottom:8px;
border-radius:4px;
}

/* NEWS */

.news{
background:#111;
padding:10px;
border-radius:6px;
margin-top:10px;
}

.news a{
color:#00ff9c;
display:block;
margin-bottom:4px;
text-decoration:none;
}

/* SEARCH */

.searchBox{
margin-bottom:10px;
}

button{
background:#00ff9c;
border:none;
padding:6px 10px;
cursor:pointer;
}

input{
background:#1a1a1a;
border:none;
padding:6px;
color:white;
}

#chart{
margin-top:20px;
height:500px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div onclick="showPanel('scanner')">📊</div>
<div onclick="showPanel('search')">🔍</div>
<div onclick="showPanel('flow')">⚡</div>
<div onclick="showPanel('settings')">⚙️</div>

</div>

<div class="topbar">
JetTrend AI Terminal
</div>

<div class="ticker" id="ticker"></div>

<div class="main">

<!-- METERS -->

<div class="meters">

<div class="meter">
<div class="gauge" id="sentimentGauge" style="--value:50%"></div>
<div class="meterLabel">Sentiment</div>
<div id="sentimentText">Neutral</div>
</div>

<div class="meter">
<div class="gauge" id="signalGauge" style="--value:50%"></div>
<div class="meterLabel">AI Strength</div>
<div id="strengthText">0</div>
</div>

<div class="meter">
<div class="gauge" id="momentumGauge" style="--value:50%"></div>
<div class="meterLabel">Momentum</div>
<div id="momentumText">0</div>
</div>

<div class="meter">
<div class="gauge" id="ratioGauge" style="--value:50%"></div>
<div class="meterLabel">Bull/Bear</div>
<div id="ratioText">0</div>
</div>

</div>

<!-- SCANNER PANEL -->

<div id="scannerPanel">

<table>

<thead>
<tr>
<th>Time</th>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
<th>Probability</th>
<th>Trend</th>
<th>Flow</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div class="news" id="news"></div>

<div id="chart"></div>

</div>

<!-- SEARCH PANEL -->

<div id="searchPanel" style="display:none">

<div class="searchBox">

<input id="searchTicker" placeholder="Enter ticker">
<button onclick="searchTicker()">Search</button>

</div>

<div id="searchResult"></div>

<h3>Quick Access</h3>
<div id="quickList"></div>

</div>

<!-- FLOW PANEL -->

<div id="flowPanel" style="display:none">

<h3>Institutional Flow</h3>

<table>

<thead>
<tr>
<th>Time</th>
<th>Ticker</th>
<th>Type</th>
<th>Size</th>
<th>Premium</th>
</tr>
</thead>

<tbody id="flowTable"></tbody>

</table>

</div>

<!-- SETTINGS -->

<div id="settingsPanel" style="display:none">

<h3>Add Watchlist</h3>

<input id="watchInput" placeholder="Ticker">
<button onclick="addWatch()">Add</button>

<div id="watchlist"></div>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="right">

<div class="panel">
<h3>Top Gainers</h3>
<div id="gainers"></div>
</div>

<div class="panel">
<h3>Top Losers</h3>
<div id="losers"></div>
</div>

<div class="panel">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

</div>

</div>

<script>

/* DEFAULT SYMBOLS */

let symbols=["AAPL","NVDA","TSLA","AMD","META"]
let history={}
symbols.forEach(s=>history[s]=[])

/* NAVIGATION */

function showPanel(p){

["scannerPanel","searchPanel","flowPanel","settingsPanel"]
.forEach(id=>document.getElementById(id).style.display="none")

if(p==="scanner")document.getElementById("scannerPanel").style.display="block"
if(p==="search")document.getElementById("searchPanel").style.display="block"
if(p==="flow")document.getElementById("flowPanel").style.display="block"
if(p==="settings")document.getElementById("settingsPanel").style.display="block"

}

/* API */

async function getPrice(symbol){

try{

let r=await fetch(`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`)
let d=await r.json()

if(!d.price)return null

return Number(d.price)

}catch{

return null

}

}

/* EMA */

function ema(d,p){

let k=2/(p+1)
let e=d[0]

for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k)

return e

}

/* AI TREND */

function aiPrediction(h){

let e9=ema(h.slice(-9),9)
let e21=ema(h.slice(-21),21)

let momentum=h[h.length-1]-h[h.length-5]

let score=(e9-e21)*40+momentum*10

if(score>30)return["STRONG BUY","90%"]
if(score>10)return["BUY","75%"]
if(score<-30)return["STRONG SELL","90%"]
if(score<-10)return["SELL","70%"]

return["NEUTRAL","50%"]

}

/* CHART */

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:500
})

}

/* ALERT */

function alertMsg(t){

let div=document.createElement("div")
div.className="alert"
div.innerText=t

document.getElementById("alerts").prepend(div)

}

/* SEARCH */

async function searchTicker(){

let s=document.getElementById("searchTicker").value.toUpperCase()

let p=await getPrice(s)

if(!p)return

if(!history[s])history[s]=[]

history[s].push(p)

let [signal,prob]=aiPrediction(history[s])

document.getElementById("searchResult").innerHTML=

`<b>${s}</b><br>Price ${p.toFixed(2)}<br>Signal ${signal}<br>Probability ${prob}
<br><button onclick="saveQuickTicker('${s}')">Save</button>`

loadChart(s)

}

/* QUICK ACCESS */

let quickTickers=["SPY","QQQ","AAPL","NVDA"]

function saveQuickTicker(t){

let saved=JSON.parse(localStorage.getItem("jettrend_quick"))||[]

if(!saved.includes(t)){
saved.push(t)
localStorage.setItem("jettrend_quick",JSON.stringify(saved))
}

loadQuick()

}

function loadQuick(){

let saved=JSON.parse(localStorage.getItem("jettrend_quick"))||quickTickers

let q=document.getElementById("quickList")

q.innerHTML=""

saved.forEach(t=>{

let b=document.createElement("button")
b.innerText=t
b.onclick=()=>searchTicker(t)

q.appendChild(b)

})

}

/* SCANNER */

async function buildScanner(){

let table=document.getElementById("scanner")
table.innerHTML=""

let buy=0
let sell=0

for(let s of symbols){

let p=await getPrice(s)

if(p)history[s].push(p)

if(history[s].length<25)continue

let [signal,prob]=aiPrediction(history[s])

let trend=Math.abs(
ema(history[s].slice(-9),9)-ema(history[s].slice(-21),21)
).toFixed(2)

if(signal.includes("BUY"))buy++
if(signal.includes("SELL"))sell++

let flow=["Sweep","Block","Split","Momentum"]
flow=flow[Math.floor(Math.random()*flow.length)]

let tr=document.createElement("tr")

tr.innerHTML=

`<td>${new Date().toLocaleTimeString()}</td>
<td class="symbol" onclick="loadChart('${s}')">${s}</td>
<td>${p?p.toFixed(2):"-"}</td>
<td class="${signal.includes('BUY')?'buy':'sell'}">${signal}</td>
<td class="prob">${prob}</td>
<td>${trend}</td>
<td class="flow">${flow}</td>`

table.appendChild(tr)

}

updateMeters(buy,sell)

}

/* METERS */

function updateMeters(buys,sells){

let total=buys+sells||1

let sentiment=Math.round((buys/total)*100)

document.getElementById("sentimentGauge")
.style.setProperty("--value",sentiment+"%")

document.getElementById("sentimentText").innerText=
buys>sells?"Bullish":sells>buys?"Bearish":"Neutral"

}

/* NEWS */

function news(){

let headlines=[
"Nvidia leads AI rally",
"Tesla volatility spikes",
"Fed policy outlook moves markets",
"Tech sector strength continues"
]

let n=document.getElementById("news")

n.innerHTML="<b>Market News</b>"

headlines.forEach(h=>{
let a=document.createElement("a")
a.innerText="• "+h
n.appendChild(a)
})

}

/* TICKER */

async function ticker(){

let t=document.getElementById("ticker")
t.innerHTML=""

for(let s of symbols){

let p=await getPrice(s)

if(!p)continue

let span=document.createElement("span")
span.innerText=`${s} ${p.toFixed(2)}`
t.appendChild(span)

}

}

/* FLOW */

function flow(){

let table=document.getElementById("flowTable")
table.innerHTML=""

let types=["Sweep","Block","Split"]

for(let i=0;i<6;i++){

let s=symbols[Math.floor(Math.random()*symbols.length)]

let size=Math.floor(Math.random()*50000)

let premium="$"+size*2

table.innerHTML+=

`<tr>
<td>${new Date().toLocaleTimeString()}</td>
<td>${s}</td>
<td>${types[Math.floor(Math.random()*types.length)]}</td>
<td>${size}</td>
<td>${premium}</td>
</tr>`

}

}

/* INIT */

news()
loadQuick()
ticker()
buildScanner()
flow()

setInterval(buildScanner,20000)
setInterval(ticker,10000)
setInterval(flow,15000)

</script>

</body>

</html>

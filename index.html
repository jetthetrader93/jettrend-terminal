<!DOCTYPE html>
<html>

<head>

<title>JetTrend Pro Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#0a0a0a;
color:white;
}

/* TOP BAR */

.topbar{
background:#111;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
font-size:15px;
}

.logo{
font-weight:600;
letter-spacing:1px;
}

.ticker{
display:flex;
gap:20px;
color:#aaa;
}

/* MAIN LAYOUT */

.layout{
display:grid;
grid-template-columns:260px 1fr 320px;
gap:12px;
padding:12px;
height:calc(100vh - 50px);
}

/* PANELS */

.panel{
background:#141414;
border-radius:6px;
padding:12px;
overflow:auto;
border:1px solid #1f1f1f;
}

.panel h3{
margin-top:0;
font-weight:500;
font-size:16px;
color:#ccc;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
color:#888;
padding:8px;
border-bottom:1px solid #222;
}

td{
padding:8px;
border-bottom:1px solid #1a1a1a;
}

.symbol{
font-weight:600;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c}
.sell{color:#ff4d4d}

/* HEATMAP */

.heatmap{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
}

.heat{
padding:18px;
text-align:center;
border-radius:4px;
font-weight:600;
font-size:13px;
}

.green{background:#006b3f}
.red{background:#7a0000}

/* ALERTS */

.alert{
background:#1e1e1e;
padding:6px;
margin-bottom:6px;
border-radius:3px;
font-size:13px;
}

/* CHART */

#chart{
height:420px;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">JetTrend Pro Terminal</div>

<div id="ticker" class="ticker"></div>

</div>

<div class="layout">

<!-- WATCHLIST / SCREENER -->

<div class="panel">

<h3>Stock Screener</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
</tr>
</thead>

<tbody id="watchlist"></tbody>

</table>

</div>

<!-- HEATMAP -->

<div class="panel">

<h3>Market Heatmap</h3>

<div id="heatmap" class="heatmap"></div>

</div>

<!-- ALERTS -->

<div class="panel">

<h3>Alerts</h3>

<div id="alerts"></div>

</div>

<!-- CHART -->

<div class="panel" style="grid-column:2/4">

<h3>Chart</h3>

<div id="chart"></div>

</div>

</div>

<script>

/* ONLY 5 SCREENER STOCKS */

const screenerStocks=[
"AAPL",
"NVDA",
"TSLA",
"AMD",
"META"
]

/* HEATMAP STOCKS */

const heatmapStocks=[
"AAPL","NVDA","MSFT",
"META","AMD","TSLA",
"GOOGL","AMZN","SPY"
]

let lastPrices={}

async function getPrice(symbol){

try{

const res=await fetch(
`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`
)

const data=await res.json()

return parseFloat(data.price)

}catch{

return null

}

}

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
style:"1",
width:"100%",
height:420
})

}

function addAlert(text){

let div=document.createElement("div")
div.className="alert"
div.innerText=text

document.getElementById("alerts").prepend(div)

}

function signal(price,last){

if(!last)return "NEUTRAL"
if(price>last)return "BUY"
if(price<last)return "SELL"
return "NEUTRAL"

}

function buildTicker(data){

let ticker=document.getElementById("ticker")

ticker.innerHTML=""

for(let s of ["SPY","QQQ","DIA"]){

let div=document.createElement("div")

div.innerText=s+" "+(data[s]??"-")

ticker.appendChild(div)

}

}

function buildHeat(symbol,price,last){

let box=document.createElement("div")

let change=price-last

box.className="heat "+(change>=0?"green":"red")

box.innerText=symbol

document.getElementById("heatmap").appendChild(box)

}

async function build(){

let watch=document.getElementById("watchlist")
let heat=document.getElementById("heatmap")

watch.innerHTML=""
heat.innerHTML=""

let prices={}

for(let s of screenerStocks){

let price=await getPrice(s)

prices[s]=price

let tr=document.createElement("tr")

let sym=document.createElement("td")
sym.innerText=s
sym.className="symbol"
sym.onclick=()=>loadChart(s)

let p=document.createElement("td")
p.innerText=price?price.toFixed(2):"-"

let sig=document.createElement("td")

let sgn=signal(price,lastPrices[s])

sig.innerText=sgn

if(sgn==="BUY")sig.className="buy"
if(sgn==="SELL")sig.className="sell"

tr.appendChild(sym)
tr.appendChild(p)
tr.appendChild(sig)

watch.appendChild(tr)

if(lastPrices[s] && price!==lastPrices[s]){

addAlert(s+" moved to "+price.toFixed(2))

}

lastPrices[s]=price

}

/* BUILD HEATMAP */

for(let s of heatmapStocks){

let price=await getPrice(s)

if(lastPrices[s]){

buildHeat(s,price,lastPrices[s])

}

lastPrices[s]=price

prices[s]=price

}

buildTicker(prices)

}

build()

setInterval(build,20000)

loadChart("AAPL")

</script>

</body>

</html>

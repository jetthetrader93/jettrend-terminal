/* SYMBOLS */

const symbols=[

"AMZN","GOOGL","SPY"
]

let history={}
let lastSignal={}

symbols.forEach(s=>history[s]=[])

/* EMA */

function ema(data,period){

if(data.length<period) return null

let k=2/(period+1)
let e=data[data.length-period]

for(let i=data.length-period+1;i<data.length;i++)
e=data[i]*k+e*(1-k)

return e

}

/* SIGNAL ENGINE */

function signalEngine(h){

if(h.length<30) return "NEUTRAL"

let e9=ema(h,9)
let e21=ema(h,21)
let e120=ema(h,120)

if(!e9||!e21||!e120) return "NEUTRAL"

if(e9>e21&&e9>e120) return "BUY"
if(e9<e21&&e9<e120) return "SELL"

return "NEUTRAL"

}

/* SENTIMENT */

function updateSentiment(){

let buy=0
let sell=0

Object.values(lastSignal).forEach(s=>{

if(s==="SELL") sell++
})

let sentiment="Neutral"

if(buy>sell) sentiment="Bullish"
if(sell>buy) sentiment="Bearish"

document.getElementById("sentiment").innerText=sentiment
document.getElementById("strength").innerText=buy-sell

}

function alertPopup(symbol,signal){

div.innerText=`${symbol} ${signal} signal`

document.getElementById("alerts").prepend(div)

updateSentiment()

}

<td id="signal_${symbol}"></td>
<td id="breakout_${symbol}"></td>
`

document.getElementById("scanner").appendChild(row)

}

sig.innerText=signal
sig.className=signal==="BUY"?"buy":signal==="SELL"?"sell":""

document.getElementById("breakout_"+symbol).innerText=breakout+"%"

}

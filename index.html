<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* Layout */

.container{
display:grid;
grid-template-columns:70px 1fr 360px;
grid-template-rows:60px 40px 80px 1fr;
height:100vh;
}

.sidebar{
grid-row:1/5;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:20px;
cursor:pointer;
opacity:.7;
}

.sidebar div:hover{
opacity:1;
color:#00ff9c;
}

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #333;
font-weight:bold;
}

.ticker{
grid-column:2/4;
background:#0f0f0f;
border-bottom:1px solid #222;
}

.ticker span{
padding:10px 20px;
display:inline-block;
color:#00ff9c;
}

.gauges{
grid-column:2/4;
display:flex;
gap:20px;
padding:10px;
background:#111;
}

.gauge{
flex:1;
background:#151515;
border-radius:6px;
padding:10px;
text-align:center;
}

.main{
grid-column:2/3;
padding:15px;
overflow:auto;
}

.right{
grid-column:3/4;
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
cursor:pointer;
font-weight:bold;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c}
.sell{color:#ff4d4d}

#chart{
height:500px;
display:none;
margin-top:20px;
}

/* Alerts */

#alerts{
position:fixed;
top:20px;
right:20px;
width:260px;
}

.alert{
background:#111;
border-left:4px solid #00ff9c;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

/* News */

.newsCard{
background:#151515;
margin-bottom:10px;
border-radius:6px;
overflow:hidden;
}

.newsCard img{
width:100%;
height:120px;
object-fit:cover;
}

.newsText{
padding:10px;
}

</style>

</head>

<body>

<div id="alerts"></div>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>⚡</div>
</div>

<div class="topbar">
JetTrend AI Terminal
</div>

<div class="ticker" id="ticker"></div>

<div class="gauges">

<div class="gauge">
Trend Sentiment
<h2 id="sentiment">Neutral</h2>
</div>

<div class="gauge">
AI Strength
<h2 id="strength">0</h2>
</div>

</div>

<div class="main">

<h3>AI Scanner</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
<th>Breakout%</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

<h3>AI Opportunity Radar</h3>
<div id="aiRadar"></div>

<h3>Historical Alerts</h3>
<div id="alertHistory"></div>

</div>

<div class="right">

<h3>Company News</h3>
<div id="news"></div>

</div>

</div>

<script>

/* SYMBOL LIST */

const symbols=["AAPL","NVDA","TSLA","AMD","META","MSFT","SPY"]

let history={}
let alertHistory=[]

symbols.forEach(s=>{
history[s]=Array(150).fill(100+Math.random()*10)
})

/* PRICE API */

async function getPrice(symbol){

try{

let r=await fetch(`https://financialmodelingprep.com/api/v3/quote/${symbol}?apikey=demo`)
let d=await r.json()

return Number(d[0].price)

}catch{

return null

}

}

/* EMA */

function ema(data,p){

let k=2/(p+1)
let e=data[0]

for(let i=1;i<data.length;i++)
e=data[i]*k+e*(1-k)

return e

}

/* SIGNAL ENGINE */

function signalEngine(h){

let e9=ema(h.slice(-9),9)
let e21=ema(h.slice(-21),21)
let e120=ema(h.slice(-120),120)

if(e9>e21 && e9>e120) return "BUY"
if(e9<e21 && e9<e120) return "SELL"

return "NEUTRAL"

}

/* ALERT */

function triggerAlert(text){

const div=document.createElement("div")

div.className="alert"
div.innerText=text

document.getElementById("alerts").prepend(div)

}

/* SCANNER */

async function buildScanner(){

let prices=await Promise.all(symbols.map(getPrice))

let rows=""
let radar=""
let buys=0

symbols.forEach((s,i)=>{

let p=prices[i]

if(p) history[s].push(p)

let signal=signalEngine(history[s])
let breakout=Math.floor(Math.random()*100)

if(signal==="BUY"){
buys++
triggerAlert(`${s} BUY signal`)
alertHistory.push(`${new Date().toLocaleTimeString()} ${s} BUY`)
}

if(breakout>85)
radar+=`${s} breakout probability ${breakout}%<br>`

rows+=`
<tr>
<td class="symbol" onclick="loadChart('${s}')">${s}</td>
<td>${p?p.toFixed(2):"-"}</td>
<td class="${signal==="BUY"?"buy":"sell"}">${signal}</td>
<td>${breakout}%</td>
</tr>
`

})

document.getElementById("scanner").innerHTML=rows
document.getElementById("aiRadar").innerHTML=radar

document.getElementById("strength").innerText=
Math.round((buys/symbols.length)*100)

renderAlertHistory()

}

/* ALERT HISTORY */

function renderAlertHistory(){

let html=""

alertHistory.slice(-10).forEach(a=>{
html+=`${a}<br>`
})

document.getElementById("alertHistory").innerHTML=html

}

/* CHART */

function loadChart(symbol){

document.getElementById("chart").style.display="block"

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:500
})

loadNews(symbol)

}

/* NEWS */

async function loadNews(symbol){

try{

let r=await fetch(`https://financialmodelingprep.com/api/v3/stock_news?tickers=${symbol}&limit=5&apikey=demo`)
let news=await r.json()

let html=""

news.forEach(n=>{

html+=`
<div class="newsCard">

<img src="${n.image}">

<div class="newsText">

<b>${n.title}</b>

<p>${n.text.slice(0,100)}...</p>

<a href="${n.url}" target="_blank">Read</a>

</div>

</div>
`

})

document.getElementById("news").innerHTML=html

}catch{

document.getElementById("news").innerHTML="No news found"

}

}

/* TICKER */

async function ticker(){

let prices=await Promise.all(symbols.slice(0,5).map(getPrice))

let html=""

symbols.slice(0,5).forEach((s,i)=>{

let p=prices[i]

if(p)
html+=`<span>${s} ${p.toFixed(2)}</span>`

})

document.getElementById("ticker").innerHTML=html

}

/* INIT */

buildScanner()
ticker()

setInterval(buildScanner,5000)
setInterval(ticker,5000)

</script>

</body>
</html>

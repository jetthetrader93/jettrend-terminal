<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{
display:grid;
grid-template-columns:70px 1fr 360px;
grid-template-rows:60px 40px 80px 1fr;
height:100vh;
}

.sidebar{
grid-row:1/5;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:20px;
cursor:pointer;
opacity:.7;
}

.sidebar div:hover{
opacity:1;
color:#00ff9c;
}

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #333;
}

.ticker{
grid-column:2/4;
background:#0f0f0f;
border-bottom:1px solid #222;
}

.ticker span{
padding:10px 20px;
display:inline-block;
color:#00ff9c;
}

.gauges{
grid-column:2/4;
display:flex;
gap:20px;
padding:10px;
background:#111;
}

.gauge{
flex:1;
background:#151515;
border-radius:6px;
padding:10px;
text-align:center;
}

.main{
grid-column:2/3;
padding:15px;
overflow:auto;
}

.right{
grid-column:3/4;
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
cursor:pointer;
font-weight:bold;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c}
.sell{color:#ff4d4d}

#chart{
height:500px;
display:none;
margin-top:20px;
}

/* Alerts */

#alerts{
position:fixed;
top:20px;
right:20px;
width:260px;
z-index:999;
}

.alert{
background:#121212;
border-left:4px solid #00ff9c;
padding:10px;
margin-bottom:10px;
border-radius:4px;
animation:fade 6s forwards;
}

@keyframes fade{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0}
}

.newsCard{
background:#151515;
margin-bottom:10px;
border-radius:6px;
overflow:hidden;
}

.newsCard img{
width:100%;
height:120px;
object-fit:cover;
}

.newsText{
padding:10px;
}

</style>

</head>

<body>

<div id="alerts"></div>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>⚡</div>
</div>

<div class="topbar">JetTrend AI Terminal</div>

<div class="ticker" id="ticker"></div>

<div class="gauges">

<div class="gauge">
Trend Sentiment
<h2 id="sentiment">Neutral</h2>
</div>

<div class="gauge">
AI Strength
<h2 id="strength">0</h2>
</div>

</div>

<div class="main">

<h3>AI Scanner</h3>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
<th>P/L</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

<h3>Historical Alerts</h3>
<div id="alertHistory"></div>

</div>

<div class="right">

<h3>Company News</h3>
<div id="news"></div>

</div>

</div>

<script>

const API="54a78d716fd742ee8eaf5eb3aa2b2b58"

const symbols=["AAPL","NVDA","TSLA","AMD","META","MSFT","SPY"]

let history={}
let entry={}
let alerts=[]
let lastSignal={}

symbols.forEach(s=>{
history[s]=[]
})

async function getPrice(symbol){

try{

let r=await fetch(`https://api.twelvedata.com/price?symbol=${symbol}&apikey=${API}`)
let d=await r.json()

return Number(d.price)

}catch{

return null

}

}

function ema(data,p){

if(data.length<p) return data[data.length-1]

let k=2/(p+1)
let e=data[0]

for(let i=1;i<data.length;i++)
e=data[i]*k+e*(1-k)

return e

}

function signalEngine(h){

if(h.length<20) return "NEUTRAL"

let e9=ema(h.slice(-9),9)
let e21=ema(h.slice(-21),21)
let e120=ema(h.slice(-120),120)

if(e9>e21 && e9>e120) return "BUY"
if(e9<e21 && e9<e120) return "SELL"

return "NEUTRAL"

}

function calculatePL(entryPrice,current){

if(!entryPrice) return "-"

let profit=current-entryPrice
let percent=(profit/entryPrice)*100

return `${profit.toFixed(2)} (${percent.toFixed(1)}%)`

}

function alertPopup(symbol,signal){

if(lastSignal[symbol]===signal) return

lastSignal[symbol]=signal

const div=document.createElement("div")
div.className="alert"
div.innerText=`${symbol} ${signal} signal`

document.getElementById("alerts").prepend(div)

alerts.push(`${new Date().toLocaleTimeString()} ${symbol} ${signal}`)

}

async function scanner(){

let prices=await Promise.all(symbols.map(getPrice))

let html=""
let buys=0

symbols.forEach((s,i)=>{

let price=prices[i]

if(price){

history[s].push(price)

let signal=signalEngine(history[s])

if(signal==="BUY" && !entry[s])
entry[s]=price

let pl=calculatePL(entry[s],price)

if(signal==="BUY") buys++

if(signal!=="NEUTRAL")
alertPopup(s,signal)

html+=`
<tr>
<td class="symbol" onclick="loadChart('${s}')">${s}</td>
<td>${price.toFixed(2)}</td>
<td class="${signal==="BUY"?"buy":"sell"}">${signal}</td>
<td>${pl}</td>
</tr>
`

}

})

document.getElementById("scanner").innerHTML=html

document.getElementById("strength").innerText=
Math.round((buys/symbols.length)*100)

renderAlerts()

}

function renderAlerts(){

let html=""

alerts.slice(-10).forEach(a=>{
html+=a+"<br>"
})

document.getElementById("alertHistory").innerHTML=html

}

function loadChart(symbol){

document.getElementById("chart").style.display="block"

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:500
})

loadNews(symbol)

}

async function loadNews(symbol){

try{

let r=await fetch(`https://finnhub.io/api/v1/company-news?symbol=${symbol}&from=2024-01-01&to=2026-01-01&token=c3qcq1hr01qgdhqbtk80`)

let news=await r.json()

let html=""

news.slice(0,5).forEach(n=>{

html+=`
<div class="newsCard">

<img src="${n.image}">

<div class="newsText">

<b>${n.headline}</b>
<p>${n.summary.slice(0,120)}...</p>

<a href="${n.url}" target="_blank">Read</a>

</div>

</div>
`

})

document.getElementById("news").innerHTML=html

}catch{

document.getElementById("news").innerHTML="News unavailable"

}

}

async function ticker(){

let prices=await Promise.all(symbols.slice(0,5).map(getPrice))

let html=""

symbols.slice(0,5).forEach((s,i)=>{

let p=prices[i]

if(p)
html+=`<span>${s} ${p.toFixed(2)}</span>`

})

document.getElementById("ticker").innerHTML=html

}

scanner()
ticker()

setInterval(scanner,5000)
setInterval(ticker,5000)

</script>

</body>
</html>

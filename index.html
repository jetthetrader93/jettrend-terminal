<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0b0b;
color:#eee;
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:70px 1fr 340px;
grid-template-rows:60px 40px 1fr;
height:100vh;
}

/* SIDEBAR */

.sidebar{
background:#111;
grid-row:1/4;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:18px;
cursor:pointer;
opacity:.6;
}

.sidebar div:hover{
opacity:1;
color:#00ff9c;
}

/* HEADER */

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
font-weight:600;
border-bottom:1px solid #222;
}

/* TICKER */

.ticker{
grid-column:2/4;
background:#0f0f0f;
overflow:hidden;
border-bottom:1px solid #222;
}

.ticker span{
padding:10px 25px;
display:inline-block;
color:#00ff9c;
}

/* MAIN */

.main{
padding:15px;
overflow:auto;
}

/* METERS */

.meters{
display:flex;
gap:20px;
margin-bottom:20px;
}

.meter{
text-align:center;
}

.gauge{
width:90px;
height:90px;
border-radius:50%;
background:conic-gradient(#00ff9c var(--value),#222 var(--value));
margin:auto;
}

.meterLabel{
font-size:12px;
color:#aaa;
margin-top:8px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #222;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #1a1a1a;
}

.symbol{
font-weight:600;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c;}
.sell{color:#ff4d4d;}
.prob{color:#7fd3ff;}
.flow{color:#f0c330;}

/* RIGHT PANEL */

.right{
background:#141414;
border-left:1px solid #222;
padding:15px;
overflow:auto;
}

.panel{
margin-bottom:25px;
}

/* NEWS */

.newsCard{
display:flex;
background:#151515;
margin-bottom:12px;
border-radius:6px;
overflow:hidden;
}

.newsCard img{
width:120px;
height:80px;
object-fit:cover;
}

.newsText{
padding:10px;
}

.newsText h4{
margin:0;
font-size:14px;
}

.newsText p{
font-size:12px;
color:#aaa;
}

/* SEARCH */

input{
background:#1a1a1a;
border:none;
padding:6px;
color:white;
}

button{
background:#00ff9c;
border:none;
padding:6px 10px;
cursor:pointer;
}

#chart{
margin-top:20px;
height:500px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<div onclick="showPanel('scanner')">📊</div>
<div onclick="showPanel('search')">🔍</div>
<div onclick="showPanel('news')">📰</div>
</div>

<div class="topbar">
JetTrend AI Terminal
</div>

<div class="ticker" id="ticker"></div>

<div class="main">

<div class="meters">

<div class="meter">
<div class="gauge" id="sentimentGauge" style="--value:50%"></div>
<div class="meterLabel">Sentiment</div>
<div id="sentimentText">Neutral</div>
</div>

<div class="meter">
<div class="gauge" id="signalGauge" style="--value:50%"></div>
<div class="meterLabel">Signals</div>
<div id="strengthText">0</div>
</div>

</div>

<!-- SCANNER -->

<div id="scannerPanel">

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
<th>Probability</th>
<th>Trend</th>
<th>Flow</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

</div>

<!-- SEARCH -->

<div id="searchPanel" style="display:none">

<input id="searchTicker" placeholder="Search ticker">
<button onclick="searchTicker()">Search</button>

<div id="searchResult"></div>

</div>

<!-- NEWS -->

<div id="newsPanel" style="display:none">

<input id="newsSearch" placeholder="Search news">
<button onclick="searchNews()">Search</button>

<div id="newsFeed"></div>

</div>

</div>

<div class="right">

<div class="panel">
<h3>Watchlist</h3>
<div id="watchlist"></div>
</div>

<div class="panel">
<h3>Top Gainers</h3>
<div id="gainers"></div>
</div>

<div class="panel">
<h3>Top Losers</h3>
<div id="losers"></div>
</div>

</div>

</div>

<script>

/* 100 STOCK LIST */

let symbols=[
"AAPL","NVDA","TSLA","AMD","META","MSFT","GOOGL","AMZN","NFLX",
"SPY","QQQ","IWM","BABA","ORCL","CRM","ADBE","INTC","MU","SNOW",
"COIN","SHOP","UBER","PYPL","SQ","PLTR","RIVN","LCID","NIO"
]

let history={}
symbols.forEach(s=>history[s]=[])

/* NAVIGATION */

function showPanel(p){

["scannerPanel","searchPanel","newsPanel"]
.forEach(id=>document.getElementById(id).style.display="none")

document.getElementById(p+"Panel").style.display="block"

}

/* API */

async function getPrice(symbol){

try{

let r=await fetch(`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`)
let d=await r.json()

if(!d.price) return null

return Number(d.price)

}catch{

return null

}

}

/* EMA */

function ema(data,p){

let k=2/(p+1)
let e=data[0]

for(let i=1;i<data.length;i++)
e=data[i]*k+e*(1-k)

return e

}

/* AI SIGNAL */

function aiSignal(h){

let e9=ema(h.slice(-9),9)
let e21=ema(h.slice(-21),21)

if(e9>e21) return ["BUY","75%"]
if(e9<e21) return ["SELL","70%"]

return ["NEUTRAL","50%"]

}

/* FAST SCANNER */

async function buildScanner(){

let prices=await Promise.all(symbols.map(getPrice))

let rows=""

let buys=0
let sells=0

symbols.forEach((s,i)=>{

let p=prices[i]

if(p) history[s].push(p)

if(history[s].length<21) return

let [signal,prob]=aiSignal(history[s])

if(signal==="BUY") buys++
if(signal==="SELL") sells++

let trend=Math.abs(
ema(history[s].slice(-9),9)-ema(history[s].slice(-21),21)
).toFixed(2)

let flows=["Sweep","Block","Momentum"]

let flow=flows[Math.floor(Math.random()*flows.length)]

rows+=`
<tr>
<td class="symbol" onclick="loadChart('${s}')">${s}</td>
<td>${p?p.toFixed(2):"-"}</td>
<td class="${signal==="BUY"?"buy":"sell"}">${signal}</td>
<td class="prob">${prob}</td>
<td>${trend}</td>
<td class="flow">${flow}</td>
</tr>
`

})

document.getElementById("scanner").innerHTML=rows

updateMeters(buys,sells)

}

/* METERS */

function updateMeters(buys,sells){

let total=buys+sells||1

let sentiment=Math.round((buys/total)*100)

document.getElementById("sentimentGauge")
.style.setProperty("--value",sentiment+"%")

document.getElementById("sentimentText").innerText=
buys>sells?"Bullish":"Bearish"

}

/* CHART */

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:500
})

}

/* NEWS WITH IMAGES */

async function loadNews(){

let r=await fetch(
"https://finnhub.io/api/v1/news?category=general&token=demo"
)

let news=await r.json()

let html=""

news.slice(0,8).forEach(n=>{

html+=`
<div class="newsCard">

<img src="${n.image}">

<div class="newsText">

<h4>${n.headline}</h4>

<p>${n.summary}</p>

<a href="${n.url}" target="_blank">Read</a>

</div>

</div>
`

})

document.getElementById("newsFeed").innerHTML=html

}

/* NEWS SEARCH */

async function searchNews(){

let q=document.getElementById("newsSearch").value

let r=await fetch(
`https://newsapi.org/v2/everything?q=${q}&apiKey=demo`
)

let d=await r.json()

let html=""

d.articles.slice(0,10).forEach(a=>{

html+=`
<div class="newsCard">

<img src="${a.urlToImage}">

<div class="newsText">

<h4>${a.title}</h4>

<p>${a.description}</p>

<a href="${a.url}" target="_blank">Read</a>

</div>

</div>
`

})

document.getElementById("newsFeed").innerHTML=html

}

/* TICKER TAPE */

async function ticker(){

let prices=await Promise.all(symbols.slice(0,10).map(getPrice))

let html=""

symbols.slice(0,10).forEach((s,i)=>{

let p=prices[i]

if(p) html+=`<span>${s} ${p.toFixed(2)}</span>`

})

document.getElementById("ticker").innerHTML=html

}

/* INIT */

buildScanner()
ticker()
loadNews()

setInterval(buildScanner,5000)
setInterval(ticker,5000)

</script>

</body>
</html>

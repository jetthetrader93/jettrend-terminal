<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0b0b;
color:white;
}

/* HERO */

.hero{
padding:80px;
background:linear-gradient(135deg,#20003c,#000018);
}

.hero h1{
font-size:48px;
}

.hero span{
color:#ffc400;
}

.hero button{
background:#5a3df0;
border:none;
padding:14px 24px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* TERMINAL */

.container{
display:grid;
grid-template-columns:70px 1fr 360px;
grid-template-rows:60px 40px 80px auto 1fr;
height:100vh;
}

.sidebar{
background:#111;
grid-row:1/6;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:18px;
opacity:.7;
cursor:pointer;
}

.sidebar div:hover{
opacity:1;
color:#00ff9c;
}

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

.ticker{
grid-column:2/4;
background:#0f0f0f;
overflow:hidden;
border-bottom:1px solid #222;
}

.ticker span{
padding:10px 20px;
display:inline-block;
color:#00ff9c;
}

.gauges{
grid-column:2/4;
display:flex;
gap:20px;
padding:10px;
background:#111;
}

.gauge{
flex:1;
background:#151515;
border-radius:6px;
padding:15px;
text-align:center;
}

.main{
grid-column:2/3;
padding:15px;
overflow:auto;
}

.right{
grid-column:3/4;
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c;}
.sell{color:#ff4d4d;}

#chart{
margin-top:20px;
height:500px;
display:none;
}

/* NEWS */

.newsCard{
background:#151515;
border-radius:6px;
margin-bottom:10px;
overflow:hidden;
}

.newsHeader{
display:flex;
align-items:center;
gap:10px;
padding:10px;
}

.newsHeader img{
width:26px;
height:26px;
}

.newsCard img.cover{
width:100%;
height:140px;
object-fit:cover;
}

.newsText{
padding:10px;
}

.sentimentBull{color:#00ff9c;}
.sentimentBear{color:#ff4d4d;}

</style>

</head>

<body>

<section class="hero">

<h1>AI Trading <span>Terminal</span></h1>

<p>Institutional flow detection and AI trade scanning.</p>

<button onclick="launchTerminal()">Launch Terminal</button>

</section>

<div id="terminal" class="container">

<div class="sidebar">

<div>📊</div>
<div>🔎</div>
<div>⚡</div>

</div>

<div class="topbar">JetTrend AI Terminal</div>

<div class="ticker" id="ticker"></div>

<div class="gauges">

<div class="gauge">

Trend Sentiment
<h2 id="sentiment">Neutral</h2>

</div>

<div class="gauge">

AI Strength
<h2 id="strength">0</h2>

</div>

</div>

<div class="main">

<h3>AI Scanner</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
<th>Trend</th>
<th>Breakout%</th>
<th>Volume</th>
<th>Activity</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

<h3>AI Opportunity Board</h3>

<div id="aiSignals"></div>

</div>

<div class="right">

<h3 id="newsTitle">Company News</h3>

<div id="news"></div>

</div>

</div>

<script>

function launchTerminal(){
document.getElementById("terminal").scrollIntoView({behavior:"smooth"})
}

/* SYMBOLS */

let symbols=[
"AAPL","NVDA","TSLA","AMD","META",
"MSFT","GOOGL","AMZN","NFLX","SPY","QQQ"
]

let history={}
let volumeHistory={}

symbols.forEach(s=>{
history[s]=[]
volumeHistory[s]=[]
})

/* PRICE API */

async function getPrice(symbol){

try{

let r=await fetch(`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`)
let d=await r.json()

return Number(d.price)

}catch{

return null

}

}

/* EMA */

function ema(data,p){

let k=2/(p+1)
let e=data[0]

for(let i=1;i<data.length;i++)
e=data[i]*k + e*(1-k)

return e

}

/* TREND */

function trendSentiment(h){

if(h.length<120) return "Building"

let e9=ema(h.slice(-9),9)
let e21=ema(h.slice(-21),21)
let e120=ema(h.slice(-120),120)

if(e9>e120 && e21>e120) return "Bullish"
if(e9<e120 && e21<e120) return "Bearish"

return "Sideways"

}

/* SIGNAL */

function aiSignal(h){

if(h.length<21) return "NEUTRAL"

let e9=ema(h.slice(-9),9)
let e21=ema(h.slice(-21),21)

if(e9>e21) return "BUY"
if(e9<e21) return "SELL"

return "NEUTRAL"

}

/* BREAKOUT */

function breakoutProbability(h){

if(h.length<20) return 0

let high=Math.max(...h.slice(-20))
let price=h[h.length-1]

if(price>=high) return 90+Math.floor(Math.random()*10)

return Math.floor(Math.random()*60)

}

/* VOLUME */

function volumeSpike(v){

if(v.length<20) return "Normal"

let avg=v.slice(-20).reduce((a,b)=>a+b)/20

if(v[v.length-1]>avg*3) return "Spike"

return "Normal"

}

/* ACTIVITY */

function institutional(h,v){

let spike=volumeSpike(v)
let breakout=breakoutProbability(h)

if(spike==="Spike" && breakout>85) return "Institutional"

if(spike==="Spike") return "Unusual"

return "Normal"

}

/* SCANNER */

async function buildScanner(){

let prices=await Promise.all(symbols.map(getPrice))

let rows=""
let aiBoard=""
let buys=0

symbols.forEach((s,i)=>{

let p=prices[i]

if(p){

history[s].push(p)
volumeHistory[s].push(1000+Math.random()*2000)

}

let signal=aiSignal(history[s])
let trend=trendSentiment(history[s])
let breakout=breakoutProbability(history[s])
let vol=volumeSpike(volumeHistory[s])
let act=institutional(history[s],volumeHistory[s])

if(signal==="BUY") buys++

if(breakout>85)
aiBoard+=`${s} breakout probability ${breakout}%<br>`

rows+=`
<tr>
<td class="symbol" onclick="loadChart('${s}')">${s}</td>
<td>${p?p.toFixed(2):"-"}</td>
<td class="${signal==="BUY"?"buy":"sell"}">${signal}</td>
<td>${trend}</td>
<td>${breakout}%</td>
<td>${vol}</td>
<td>${act}</td>
</tr>
`

})

document.getElementById("scanner").innerHTML=rows
document.getElementById("aiSignals").innerHTML=aiBoard

document.getElementById("strength").innerText=
Math.round((buys/symbols.length)*100)

}

/* CHART */

function loadChart(symbol){

document.getElementById("chart").style.display="block"

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:500
})

loadTickerNews(symbol)

}

/* NEWS SENTIMENT */

function sentimentScore(text){

text=text.toLowerCase()

if(text.includes("upgrade") || text.includes("surge") || text.includes("growth"))
return "Bullish"

if(text.includes("lawsuit") || text.includes("drop") || text.includes("cut"))
return "Bearish"

return "Neutral"

}

/* TICKER NEWS */

async function loadTickerNews(symbol){

document.getElementById("newsTitle").innerText=symbol+" News"

let r=await fetch(`https://finnhub.io/api/v1/company-news?symbol=${symbol}&from=2024-01-01&to=2026-12-31&token=demo`)

let news=await r.json()

let html=""

news.slice(0,6).forEach(n=>{

let sentiment=sentimentScore(n.headline)

html+=`
<div class="newsCard">

<img class="cover" src="${n.image}">

<div class="newsHeader">

<img src="https://logo.clearbit.com/${symbol}.com">

<b>${symbol}</b>

<span class="${sentiment==="Bullish"?"sentimentBull":"sentimentBear"}">${sentiment}</span>

</div>

<div class="newsText">

<h4>${n.headline}</h4>

<p>${n.summary}</p>

<a href="${n.url}" target="_blank">Read</a>

</div>

</div>
`

})

document.getElementById("news").innerHTML=html

}

/* TICKER */

async function ticker(){

let prices=await Promise.all(symbols.slice(0,6).map(getPrice))

let html=""

symbols.slice(0,6).forEach((s,i)=>{

let p=prices[i]

if(p) html+=`<span>${s} ${p.toFixed(2)}</span>`

})

document.getElementById("ticker").innerHTML=html

}

/* INIT */

buildScanner()
ticker()

setInterval(buildScanner,4000)
setInterval(ticker,4000)

</script>

</body>
</html>

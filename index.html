<!DOCTYPE html>

<html>

<head>

<title>JetTrend Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* MAIN GRID */

.container{
display:grid;
grid-template-columns:70px 1fr 320px;
grid-template-rows:80px 1fr;
height:100vh;
}

/* SIDEBAR */

.sidebar{
grid-row:1 / 3;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:20px;
cursor:pointer;
opacity:.7;
}

.sidebar div:hover{
opacity:1;
}

/* TOPBAR */

.topbar{
grid-column:2 / 4;
background:#141414;
display:flex;
justify-content:space-around;
align-items:center;
border-bottom:1px solid #333;
}

/* METER */

.meter{
text-align:center;
}

.gauge{
width:80px;
height:80px;
border-radius:50%;
background:conic-gradient(#00ff9c 0% var(--value), #333 var(--value) 100%);
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

/* TABLE */

.main{
padding:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #222;
text-align:center;
}

.symbol{
cursor:pointer;
font-weight:bold;
}

/* SIGNAL COLORS */

.buy{color:#00ff9c}
.sell{color:#ff4d4d}
.neutral{color:#aaa}

/* ALERT PANEL */

.right{
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

.alert{
background:#1a1a1a;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

/* CHART */

#chartContainer{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>📈</div>
<div>⚙️</div>
</div>

<!-- TOP METERS -->

<div class="topbar">

<div class="meter">
<div class="gauge" id="sentimentGauge" style="--value:50%">50</div>
<div>Sentiment</div>
</div>

<div class="meter">
<div class="gauge" id="strengthGauge" style="--value:50%">50</div>
<div>Market Strength</div>
</div>

<div class="meter">
<div class="gauge" id="signalGauge" style="--value:50%">0</div>
<div>Active Signals</div>
</div>

</div>

<!-- MAIN TABLE -->

<div class="main">

<h3>JetTrend Signal Feed</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>5m</th>
<th>15m</th>
<th>1h</th>
<th>4h</th>
<th>Signal</th>
</tr>
</thead>

<tbody id="signalTable"></tbody>

</table>

<div id="chartContainer"></div>

</div>

<!-- ALERT FEED -->

<div class="right">

<h3>Signal Alerts</h3>

<div id="alertFeed"></div>

</div>

</div>

<script>

const symbols=[
"AAPL",
"NVDA",
"TSLA",
"AMD",
"META",
"MSFT",
"SPY",
"QQQ"
]

async function getCandles(symbol,tf){

const url=`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=${tf}&range=1d`

try{

const res=await fetch(url)
const data=await res.json()

return data.chart.result[0].indicators.quote[0].close

}catch{

return[]

}

}

function ema(values,p){

let k=2/(p+1)
let ema=values[0]

for(let i=1;i<values.length;i++){
ema=values[i]*k+ema*(1-k)
}

return ema

}

function jetTrend(closes){

if(!closes || closes.length<20) return "NEUTRAL"

let ema9=ema(closes,9)
let ema21=ema(closes,21)

if(ema9>ema21) return "BUY"
if(ema9<ema21) return "SELL"

return "NEUTRAL"

}

function signalClass(sig){

if(sig==="BUY") return "buy"
if(sig==="SELL") return "sell"

return "neutral"

}

function createCell(sig){

let td=document.createElement("td")
td.className=signalClass(sig)
td.innerText=sig
return td

}

function addAlert(text){

let feed=document.getElementById("alertFeed")

let alert=document.createElement("div")

alert.className="alert"
alert.innerText=text

feed.prepend(alert)

}

async function scanSymbol(symbol){

let m5=jetTrend(await getCandles(symbol,"5m"))
let m15=jetTrend(await getCandles(symbol,"15m"))
let h1=jetTrend(await getCandles(symbol,"60m"))
let h4=jetTrend(await getCandles(symbol,"60m"))

return {symbol,m5,m15,h1,h4,signal:m5}

}

function createRow(data){

let tr=document.createElement("tr")

let sym=document.createElement("td")
sym.className="symbol"
sym.innerText=data.symbol
sym.onclick=()=>loadChart(data.symbol)

tr.appendChild(sym)

tr.appendChild(createCell(data.m5))
tr.appendChild(createCell(data.m15))
tr.appendChild(createCell(data.h1))
tr.appendChild(createCell(data.h4))
tr.appendChild(createCell(data.signal))

return tr

}

function updateGauges(buys,total){

let sentiment=Math.round((buys/total)*100)

document.getElementById("sentimentGauge").style.setProperty("--value",sentiment+"%")
document.getElementById("sentimentGauge").innerText=sentiment

document.getElementById("strengthGauge").style.setProperty("--value",sentiment+"%")
document.getElementById("strengthGauge").innerText=sentiment

document.getElementById("signalGauge").style.setProperty("--value",sentiment+"%")
document.getElementById("signalGauge").innerText=buys

}

async function updateTerminal(){

let table=document.getElementById("signalTable")

table.innerHTML=""

let results=await Promise.all(symbols.map(scanSymbol))

let buys=0

results.forEach(r=>{

table.appendChild(createRow(r))

if(r.signal==="BUY"){
buys++
addAlert(r.symbol+" JetTrend BUY")
}

})

updateGauges(buys,symbols.length)

}

function loadChart(symbol){

document.getElementById("chartContainer").innerHTML=""

new TradingView.widget({
container_id:"chartContainer",
symbol:symbol,
interval:"5",
theme:"dark",
style:"1",
width:"100%",
height:500
})

}

updateTerminal()

setInterval(updateTerminal,20000)

</script>

</body>

</html>

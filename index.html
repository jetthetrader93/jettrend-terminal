<!DOCTYPE html>

<html>
<head>

<title>JetTrend Terminal</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.container{
display:grid;
grid-template-columns:70px 1fr 350px;
grid-template-rows:80px 1fr;
height:100vh;
}

.sidebar{
grid-row:1 / 3;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:20px;
cursor:pointer;
opacity:.7;
}

.sidebar div:hover{
opacity:1;
}

.topbar{
grid-column:2 / 4;
background:#141414;
display:flex;
justify-content:space-around;
align-items:center;
border-bottom:1px solid #333;
}

.gauge{
width:80px;
height:80px;
border-radius:50%;
background:conic-gradient(#00ff9c 0% 50%, #333 50% 100%);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.main{
padding:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #222;
text-align:center;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.buy{color:#00ff9c}
.sell{color:#ff4d4d}
.neutral{color:#aaa}

.right{
background:#141414;
border-left:1px solid #333;
padding:15px;
}

.alert{
background:#1a1a1a;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

#chart{
margin-top:20px;
height:550px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>📈</div>
<div>⚙️</div>
</div>

<div class="topbar">

<div>
<div class="gauge">50</div>
<div>Sentiment</div>
</div>

<div>
<div class="gauge">50</div>
<div>Market Strength</div>
</div>

<div>
<div class="gauge">0</div>
<div>Active Signals</div>
</div>

</div>

<div class="main">

<h3>JetTrend Signal Feed</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Signal</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<div id="chart"></div>

</div>

<div class="right">

<h3>Signal Alerts</h3>

<div id="alerts"></div>

</div>

</div>

<script>

const stocks=[
"AAPL",
"NVDA",
"TSLA",
"AMD",
"META",
"MSFT",
"SPY",
"QQQ"
]

function randomSignal(){

const r=Math.random()

if(r>.66) return "BUY"
if(r<.33) return "SELL"

return "NEUTRAL"

}

function signalClass(s){

if(s=="BUY") return "buy"
if(s=="SELL") return "sell"

return "neutral"

}

function buildScanner(){

const table=document.getElementById("table")

stocks.forEach(s=>{

const sig=randomSignal()

let tr=document.createElement("tr")

let sym=document.createElement("td")
sym.innerText=s
sym.className="symbol"

sym.onclick=()=>loadChart(s)

let signal=document.createElement("td")
signal.innerText=sig
signal.className=signalClass(sig)

tr.appendChild(sym)
tr.appendChild(signal)

table.appendChild(tr)

if(sig=="BUY"){
addAlert(s+" JetTrend BUY")
}

})

}

function addAlert(text){

let alert=document.createElement("div")

alert.className="alert"
alert.innerText=text

document.getElementById("alerts").prepend(alert)

}

function loadChart(symbol){

document.getElementById("chart").innerHTML=
`<iframe
width="100%"
height="550"
src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=5&theme=dark"
frameborder="0">
</iframe>`

}

buildScanner()

</script>

</body>

</html>

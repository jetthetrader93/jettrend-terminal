<!DOCTYPE html>

<html>
<head>

<title>JetTrend Market Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{
display:grid;
grid-template-columns:70px 1fr 320px;
grid-template-rows:70px 1fr;
height:100vh;
}

.sidebar{
grid-row:1 / 3;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:18px;
opacity:.7;
cursor:pointer;
}

.sidebar div:hover{
opacity:1;
}

.topbar{
grid-column:2 / 4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #333;
font-weight:bold;
}

#marketStatus{
margin-left:20px;
color:#00ff9c;
}

.main{
padding:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.green{color:#00ff9c}
.red{color:#ff4d4d}

.right{
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

.alert{
background:#1a1a1a;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

#chart{
margin-top:20px;
height:520px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>📈</div>
<div>⚙️</div>
</div>

<div class="topbar">
JetTrend Market Terminal
<span id="marketStatus">Loading...</span>
</div>

<div class="main">

<h3>Market Scanner</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Change</th>
<th>Signal</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

</div>

<div class="right">

<h3>Alerts</h3>

<div id="alerts"></div>

</div>

</div>

<script>

const API="d6qpsl9r01qgdhqbtjngd6qpsl9r01qgdhqbtjo0"

const symbols=[
"AAPL","NVDA","TSLA","AMD","META","MSFT","SPY","QQQ"
]

async function getMarketStatus(){

const url=`https://api.allorigins.win/raw?url=https://finnhub.io/api/v1/stock/market-status?exchange=US&token=${API}`

const res=await fetch(url)
const data=await res.json()

document.getElementById("marketStatus").innerText=
data.isOpen ? "Market Open" : "Market Closed"

}

async function getQuote(symbol){

const url=`https://api.allorigins.win/raw?url=https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API}`

try{

const res=await fetch(url)
const data=await res.json()

return{
price:data.c || "-",
change:data.dp || 0
}

}catch{

return{price:"-",change:0}

}

}

function signalFromChange(change){

if(change>1) return "BUY"
if(change<-1) return "SELL"

return "NEUTRAL"

}

function signalColor(sig){

if(sig==="BUY") return "green"
if(sig==="SELL") return "red"

return ""

}

function addAlert(text){

let alert=document.createElement("div")

alert.className="alert"
alert.innerText=text

document.getElementById("alerts").prepend(alert)

}

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
style:"1",
width:"100%",
height:520
})

}

async function buildScanner(){

let table=document.getElementById("scanner")

table.innerHTML=""

for(let s of symbols){

let q=await getQuote(s)

let signal=signalFromChange(q.change)

let tr=document.createElement("tr")

let sym=document.createElement("td")
sym.innerText=s
sym.className="symbol"
sym.onclick=()=>loadChart(s)

let price=document.createElement("td")
price.innerText=q.price

let change=document.createElement("td")
change.innerText=q.change.toFixed(2)+"%"

if(q.change>0) change.className="green"
if(q.change<0) change.className="red"

let sig=document.createElement("td")
sig.innerText=signal
sig.className=signalColor(signal)

tr.appendChild(sym)
tr.appendChild(price)
tr.appendChild(change)
tr.appendChild(sig)

table.appendChild(tr)

if(signal==="BUY"){
addAlert(s+" momentum BUY")
}

}

}

getMarketStatus()
buildScanner()

setInterval(buildScanner,30000)

</script>

</body>
</html>

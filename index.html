<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0b0b;
color:white;
}

/* HERO */

.hero{
padding:80px;
background:linear-gradient(135deg,#20003c,#000018);
}

.hero h1{
font-size:48px;
}

.hero span{
color:#ffc400;
}

/* TERMINAL */

.container{
display:grid;
grid-template-columns:70px 1fr 380px;
grid-template-rows:60px 40px 80px auto auto 1fr;
height:100vh;
}

.sidebar{
background:#111;
grid-row:1/7;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:18px;
opacity:.7;
cursor:pointer;
}

.sidebar div:hover{
opacity:1;
color:#00ff9c;
}

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #222;
}

.ticker{
grid-column:2/4;
background:#0f0f0f;
border-bottom:1px solid #222;
}

.ticker span{
padding:10px 20px;
display:inline-block;
color:#00ff9c;
}

.gauges{
grid-column:2/4;
display:flex;
gap:20px;
padding:10px;
background:#111;
}

.gauge{
flex:1;
background:#151515;
padding:15px;
border-radius:6px;
text-align:center;
}

/* SCANNER */

.main{
grid-column:2/3;
padding:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c;}
.sell{color:#ff4d4d;}

#chart{
height:500px;
display:none;
margin-top:20px;
}

/* RIGHT PANEL */

.right{
grid-column:3/4;
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

/* HEATMAP */

.heatmap{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
margin-bottom:20px;
}

.heatmap div{
padding:20px;
text-align:center;
border-radius:4px;
font-weight:bold;
}

/* FLOW TABLE */

.flowTable td{
font-size:12px;
}

/* NEWS */

.newsCard{
background:#151515;
border-radius:6px;
margin-bottom:10px;
overflow:hidden;
}

.newsCard img{
width:100%;
height:120px;
object-fit:cover;
}

.newsText{
padding:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div>📊</div>
<div>🔎</div>
<div>⚡</div>

</div>

<div class="topbar">JetTrend AI Terminal</div>

<div class="ticker" id="ticker"></div>

<div class="gauges">

<div class="gauge">
Trend Sentiment
<h2 id="sentiment">Neutral</h2>
</div>

<div class="gauge">
AI Strength
<h2 id="strength">0</h2>
</div>

</div>

<div class="main">

<h3>AI Scanner</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
<th>Trend</th>
<th>Breakout%</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

<h3>AI Opportunity Radar</h3>
<div id="aiSignals"></div>

<h3>Institutional Flow</h3>

<table class="flowTable">

<thead>

<tr>
<th>Time</th>
<th>Symbol</th>
<th>Type</th>
<th>Size</th>
<th>Premium</th>
</tr>

</thead>

<tbody id="flow"></tbody>

</table>

</div>

<div class="right">

<h3>Market Heatmap</h3>

<div class="heatmap" id="heatmap"></div>

<h3>Company News</h3>

<div id="news"></div>

</div>

</div>

<script>

let symbols=["AAPL","NVDA","TSLA","AMD","META","MSFT","GOOGL","AMZN","SPY"]

let history={}

symbols.forEach(s=>history[s]=[])

/* PRICE */

async function getPrice(symbol){

try{

let r=await fetch(`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`)
let d=await r.json()

return Number(d.price)

}catch{return null}

}

/* EMA */

function ema(data,p){

let k=2/(p+1)
let e=data[0]

for(let i=1;i<data.length;i++)
e=data[i]*k + e*(1-k)

return e

}

/* SIGNAL */

function aiSignal(h){

if(h.length<21) return "NEUTRAL"

let e9=ema(h.slice(-9),9)
let e21=ema(h.slice(-21),21)

if(e9>e21) return "BUY"
if(e9<e21) return "SELL"

return "NEUTRAL"

}

/* SCANNER */

async function buildScanner(){

let prices=await Promise.all(symbols.map(getPrice))

let rows=""
let radar=""

symbols.forEach((s,i)=>{

let p=prices[i]

if(p) history[s].push(p)

let signal=aiSignal(history[s])

let breakout=Math.floor(Math.random()*100)

if(breakout>85)
radar+=`${s} breakout probability ${breakout}%<br>`

rows+=`
<tr>
<td class="symbol" onclick="loadChart('${s}')">${s}</td>
<td>${p?p.toFixed(2):"-"}</td>
<td class="${signal==="BUY"?"buy":"sell"}">${signal}</td>
<td>${signal==="BUY"?"Bullish":"Bearish"}</td>
<td>${breakout}%</td>
</tr>
`

})

document.getElementById("scanner").innerHTML=rows
document.getElementById("aiSignals").innerHTML=radar

}

/* CHART */

function loadChart(symbol){

document.getElementById("chart").style.display="block"

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:500

})

loadNews(symbol)

}

/* NEWS */

async function loadNews(symbol){

let r=await fetch(`https://finnhub.io/api/v1/company-news?symbol=${symbol}&from=2024-01-01&to=2026-12-31&token=demo`)

let news=await r.json()

let html=""

news.slice(0,5).forEach(n=>{

html+=`
<div class="newsCard">

<img src="${n.image}">

<div class="newsText">

<b>${n.headline}</b>

<p>${n.summary}</p>

</div>

</div>
`

})

document.getElementById("news").innerHTML=html

}

/* FLOW */

function generateFlow(){

let types=["Sweep","Block","Split"]

let html=""

for(let i=0;i<6;i++){

let s=symbols[Math.floor(Math.random()*symbols.length)]

html+=`
<tr>
<td>${new Date().toLocaleTimeString()}</td>
<td>${s}</td>
<td>${types[Math.floor(Math.random()*3)]}</td>
<td>${Math.floor(Math.random()*5000)}</td>
<td>$${Math.floor(Math.random()*200000)}</td>
</tr>
`

}

document.getElementById("flow").innerHTML=html

}

/* HEATMAP */

function buildHeatmap(){

let html=""

symbols.slice(0,9).forEach(s=>{

let move=Math.random()*4-2

let color=move>0?"#0a3":"#a00"

html+=`<div style="background:${color}">${s}<br>${move.toFixed(2)}%</div>`

})

document.getElementById("heatmap").innerHTML=html

}

/* TICKER */

async function ticker(){

let prices=await Promise.all(symbols.slice(0,5).map(getPrice))

let html=""

symbols.slice(0,5).forEach((s,i)=>{

let p=prices[i]

if(p) html+=`<span>${s} ${p.toFixed(2)}</span>`

})

document.getElementById("ticker").innerHTML=html

}

/* INIT */

buildScanner()
ticker()
generateFlow()
buildHeatmap()

setInterval(buildScanner,5000)
setInterval(ticker,5000)
setInterval(generateFlow,4000)

</script>

</body>
</html>

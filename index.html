<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0a0a0a;
color:white;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:70px;
height:100%;
background:#111;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
}

.sidebar div{
margin:20px 0;
opacity:.6;
cursor:pointer;
font-size:20px;
}

.sidebar div:hover{
opacity:1;
}

/* MAIN */

.main{
margin-left:70px;
margin-right:260px;
padding:15px;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

/* TICKER */

.ticker{
display:flex;
gap:25px;
font-size:14px;
color:#aaa;
}

/* METRICS */

.metrics{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:12px;
}

.metric{
background:#141414;
padding:14px;
border-radius:6px;
border:1px solid #1f1f1f;
}

.metric span{
font-size:22px;
font-weight:600;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
color:#888;
text-align:left;
padding:8px;
border-bottom:1px solid #222;
}

td{
padding:8px;
border-bottom:1px solid #1a1a1a;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c}
.sell{color:#ff4d4d}

/* ALERTS */

.right{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:#111;
padding:15px;
overflow:auto;
}

.alert{
background:#1e1e1e;
padding:8px;
margin-bottom:8px;
border-radius:3px;
font-size:13px;
}

/* CHART */

#chart{
margin-top:15px;
height:420px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div>📊</div>
<div>🔎</div>
<div>📈</div>
<div>⚡</div>
<div>⚙️</div>

</div>

<!-- ALERTS -->

<div class="right">

<h3>Alerts</h3>

<div id="alerts"></div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h2>JetTrend AI Terminal</h2>

<div id="ticker" class="ticker"></div>

</div>

<!-- METRICS -->

<div class="metrics">

<div class="metric">
Market Sentiment<br>
<span id="sentiment">Neutral</span>
</div>

<div class="metric">
AI Signal Strength<br>
<span id="strength">0.00</span>
</div>

<div class="metric">
Momentum Ratio<br>
<span id="ratio">0.00</span>
</div>

</div>

<table>

<thead>
<tr>
<th>Time</th>
<th>Symbol</th>
<th>Price</th>
<th>AI Signal</th>
<th>Flow</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

</div>

<script>

/* ONLY 5 SCANNER STOCKS */

const stocks=[
"AAPL",
"NVDA",
"TSLA",
"AMD",
"META"
]

let history={}
let lastPrice={}

/* GET PRICE */

async function getPrice(symbol){

const res=await fetch(
`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`
)

const data=await res.json()

return parseFloat(data.price)

}

/* EMA CALC */

function ema(values,period){

let k=2/(period+1)
let ema=values[0]

for(let i=1;i<values.length;i++){

ema=values[i]*k+ema*(1-k)

}

return ema

}

/* AI SIGNAL */

function aiSignal(prices){

if(prices.length<21) return "NEUTRAL"

let ema9=ema(prices.slice(-9),9)
let ema21=ema(prices.slice(-21),21)

if(ema9>ema21) return "BUY"
if(ema9<ema21) return "SELL"

return "NEUTRAL"

}

/* CHART */

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:420
})

}

/* ALERT */

function addAlert(text){

let div=document.createElement("div")
div.className="alert"
div.innerText=text

document.getElementById("alerts").prepend(div)

}

/* TICKER */

function buildTicker(data){

let ticker=document.getElementById("ticker")
ticker.innerHTML=""

for(let s of ["SPY","QQQ","DIA"]){

let d=document.createElement("div")
d.innerText=s+" "+(data[s]??"-")
ticker.appendChild(d)

}

}

/* BUILD SCANNER */

async function build(){

let table=document.getElementById("scanner")
table.innerHTML=""

let prices={}
let buys=0
let sells=0

for(let s of stocks){

let price=await getPrice(s)

prices[s]=price

if(!history[s]) history[s]=[]

history[s].push(price)

if(history[s].length>50) history[s].shift()

let signal=aiSignal(history[s])

if(signal==="BUY") buys++
if(signal==="SELL") sells++

let tr=document.createElement("tr")

let time=document.createElement("td")
time.innerText=new Date().toLocaleTimeString()

let sym=document.createElement("td")
sym.innerText=s
sym.className="symbol"
sym.onclick=()=>loadChart(s)

let p=document.createElement("td")
p.innerText=price.toFixed(2)

let sig=document.createElement("td")
sig.innerText=signal

if(signal==="BUY") sig.className="buy"
if(signal==="SELL") sig.className="sell"

/* FLOW STYLE COLUMN */

let flow=document.createElement("td")

let flows=["Sweep","Block","Split"]

flow.innerText=flows[Math.floor(Math.random()*3)]

tr.appendChild(time)
tr.appendChild(sym)
tr.appendChild(p)
tr.appendChild(sig)
tr.appendChild(flow)

table.appendChild(tr)

if(lastPrice[s] && price!==lastPrice[s]){

addAlert(s+" moved to "+price.toFixed(2))

}

lastPrice[s]=price

}

/* MARKET SENTIMENT */

let sentiment="Neutral"

if(buys>sells) sentiment="Bullish"
if(sells>buys) sentiment="Bearish"

document.getElementById("sentiment").innerText=sentiment
document.getElementById("strength").innerText=(buys/(buys+sells+1)).toFixed(2)
document.getElementById("ratio").innerText=(buys-sells)

buildTicker(prices)

}

/* RUN */

build()
setInterval(build,20000)

loadChart("AAPL")

</script>

</body>
</html>

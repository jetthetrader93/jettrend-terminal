```html
<!DOCTYPE html>
<html>

<head>

<title>JetTrend Market Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{
display:grid;
grid-template-columns:70px 1fr 300px;
grid-template-rows:60px auto 1fr;
height:100vh;
}

.sidebar{
grid-row:1/4;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:18px;
opacity:.7;
cursor:pointer;
}

.sidebar div:hover{
opacity:1;
}

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #333;
font-weight:bold;
}

.main{
padding:15px;
overflow:auto;
}

.widgets{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.widget{
background:#141414;
padding:15px;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.right{
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

.alert{
background:#1a1a1a;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

.buy{color:#00ff9c;font-weight:bold;}
.sell{color:#ff4d4d;font-weight:bold;}

#chart{
margin-top:20px;
height:450px;
}

.heatmap{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:5px;
}

.heat{
padding:20px;
text-align:center;
border-radius:4px;
font-weight:bold;
}

.green{background:#006b3f;}
.red{background:#7a0000;}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>📈</div>
<div>🔥</div>
<div>⚙️</div>
</div>

<div class="topbar">
JetTrend Market Terminal
</div>

<div class="main">

<div class="widgets">

<div class="widget">

<h3>Top Movers</h3>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

</div>

<div class="widget">

<h3>Market Heatmap</h3>

<div class="heatmap" id="heatmap"></div>

</div>

</div>

<div id="chart"></div>

</div>

<div class="right">

<h3>Alerts</h3>

<div id="alerts"></div>

</div>

</div>

<script>

const symbols=[
"AAPL","NVDA","TSLA","AMD","META","MSFT","SPY","QQQ"
]

let lastPrices={}

async function getPrice(symbol){

try{

const res=await fetch(
`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`
)

const data=await res.json()

if(!data.price) return null

return parseFloat(data.price)

}catch{

return null

}

}

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
style:"1",
width:"100%",
height:450
})

}

function addAlert(text){

let div=document.createElement("div")
div.className="alert"
div.innerText=text

document.getElementById("alerts").prepend(div)

}

function getSignal(price,last){

if(!last) return "NEUTRAL"

if(price>last) return "BUY"

if(price<last) return "SELL"

return "NEUTRAL"

}

function updateHeatmap(symbol,price,last){

let map=document.getElementById("heatmap")

let box=document.createElement("div")

let change=price-last

box.className="heat "+(change>=0?"green":"red")

box.innerText=symbol

map.appendChild(box)

}

async function buildScanner(){

let table=document.getElementById("scanner")

let heat=document.getElementById("heatmap")

table.innerHTML=""
heat.innerHTML=""

for(let s of symbols){

let price=await getPrice(s)

let tr=document.createElement("tr")

let sym=document.createElement("td")
sym.innerText=s
sym.className="symbol"
sym.onclick=()=>loadChart(s)

let priceCell=document.createElement("td")
priceCell.innerText=price?price.toFixed(2):"-"

let signalCell=document.createElement("td")

let signal=getSignal(price,lastPrices[s])

signalCell.innerText=signal

if(signal==="BUY") signalCell.className="buy"
if(signal==="SELL") signalCell.className="sell"

tr.appendChild(sym)
tr.appendChild(priceCell)
tr.appendChild(signalCell)

table.appendChild(tr)

if(price && lastPrices[s] && price!==lastPrices[s]){

addAlert(s+" moved to "+price.toFixed(2))

updateHeatmap(s,price,lastPrices[s])

}

lastPrices[s]=price

}

}

buildScanner()

setInterval(buildScanner,20000)

loadChart("AAPL")

</script>

</body>

</html>

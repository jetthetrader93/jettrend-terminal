<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* GRID */

.container{
display:grid;
grid-template-columns:70px 1fr 320px;
grid-template-rows:60px 40px 1fr;
height:100vh;
}

/* SIDEBAR */

.sidebar{
grid-row:1/4;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:18px;
opacity:.6;
cursor:pointer;
}

.sidebar div:hover{
opacity:1;
color:#00ff9c;
}

/* TOPBAR */

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
font-weight:bold;
border-bottom:1px solid #333;
}

/* TICKER */

.ticker{
grid-column:2/4;
background:#0f0f0f;
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #333;
}

.ticker span{
display:inline-block;
padding:10px 25px;
color:#00ff9c;
}

/* MAIN */

.main{
padding:15px;
overflow:auto;
}

/* METERS */

.meters{
display:flex;
gap:20px;
margin-bottom:20px;
}

.meter{
text-align:center;
}

.gauge{
width:90px;
height:90px;
border-radius:50%;
background:conic-gradient(#00ff9c var(--value),#222 var(--value));
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.meterLabel{
margin-top:8px;
font-size:12px;
color:#aaa;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c;font-weight:bold;}
.sell{color:#ff4d4d;font-weight:bold;}
.flow{color:#f0c330;}
.prob{color:#7fd3ff;}

/* RIGHT PANEL */

.right{
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

.panel{
margin-bottom:20px;
}

/* ALERT */

.alert{
background:#1a1a1a;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

/* CHART */

#chart{
margin-top:20px;
height:500px;
}

/* NEWS */

.news{
background:#111;
padding:10px;
border-radius:6px;
margin-top:10px;
}

.news a{
color:#00ff9c;
display:block;
margin-bottom:5px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div onclick="showPanel('scanner')">📊</div>
<div onclick="showPanel('flow')">⚡</div>
<div onclick="showPanel('settings')">⚙️</div>

</div>

<div class="topbar">
JetTrend AI Terminal
</div>

<div class="ticker" id="ticker"></div>

<div class="main">

<!-- METERS -->

<div class="meters">

<div class="meter">
<div class="gauge" id="sentimentGauge" style="--value:50%"></div>
<div class="meterLabel">Market Sentiment</div>
<div id="sentimentText">Neutral</div>
</div>

<div class="meter">
<div class="gauge" id="signalGauge" style="--value:50%"></div>
<div class="meterLabel">AI Strength</div>
<div id="strengthText">0</div>
</div>

<div class="meter">
<div class="gauge" id="momentumGauge" style="--value:50%"></div>
<div class="meterLabel">Momentum</div>
<div id="momentumText">0</div>
</div>

<div class="meter">
<div class="gauge" id="bullBearGauge" style="--value:50%"></div>
<div class="meterLabel">Bull/Bear</div>
<div id="ratioText">0</div>
</div>

</div>

<!-- SCANNER -->

<div id="scannerPanel">

<table>

<thead>
<tr>
<th>Time</th>
<th>Symbol</th>
<th>Price</th>
<th>AI Signal</th>
<th>Probability</th>
<th>Trend</th>
<th>Flow</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div class="news" id="news">
<b>Market News</b>
</div>

<div id="chart"></div>

</div>

<!-- FLOW PANEL -->

<div id="flowPanel" style="display:none">

<h3>Institutional Flow</h3>

<table>

<thead>
<tr>
<th>Time</th>
<th>Ticker</th>
<th>Type</th>
<th>Size</th>
<th>Premium</th>
</tr>
</thead>

<tbody id="flowTable"></tbody>

</table>

</div>

<!-- SETTINGS -->

<div id="settingsPanel" style="display:none">

<h3>Watchlist</h3>

<input id="watchInput" placeholder="Ticker">
<button onclick="addWatch()">Add</button>

<div id="watchlist"></div>

</div>

</div>

<!-- RIGHT PANEL -->

<div class="right">

<div class="panel">
<h3>Top Gainers</h3>
<div id="gainers"></div>
</div>

<div class="panel">
<h3>Top Losers</h3>
<div id="losers"></div>
</div>

<div class="panel">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

</div>

</div>

<script>

/* DEFAULT STOCKS */

let symbols=["AAPL","NVDA","TSLA","AMD","META"]

let history={}
symbols.forEach(s=>history[s]=[])

/* NAV */

function showPanel(panel){

document.getElementById("scannerPanel").style.display="none"
document.getElementById("flowPanel").style.display="none"
document.getElementById("settingsPanel").style.display="none"

if(panel==="scanner")
document.getElementById("scannerPanel").style.display="block"

if(panel==="flow")
document.getElementById("flowPanel").style.display="block"

if(panel==="settings")
document.getElementById("settingsPanel").style.display="block"

}

/* API */

async function getPrice(symbol){

try{

const res=await fetch(
`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`
)

const data=await res.json()

if(!data.price) return null

return Number(data.price)

}catch{

return null

}

}

/* EMA */

function ema(data,p){

let k=2/(p+1)
let e=data[0]

for(let i=1;i<data.length;i++)
e=data[i]*k+e*(1-k)

return e

}

/* AI TREND */

function aiPrediction(h){

let e9=ema(h.slice(-9),9)
let e21=ema(h.slice(-21),21)

let momentum=h[h.length-1]-h[h.length-5]

let score=(e9-e21)*40+momentum*10

if(score>30)return["STRONG BUY","90%"]
if(score>10)return["BUY","75%"]
if(score<-30)return["STRONG SELL","90%"]
if(score<-10)return["SELL","70%"]

return["NEUTRAL","50%"]

}

/* CHART */

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:500
})

}

/* ALERT */

function alertMsg(t){

let div=document.createElement("div")
div.className="alert"
div.innerText=t

document.getElementById("alerts").prepend(div)

}

/* WATCHLIST */

function addWatch(){

let s=document.getElementById("watchInput").value.toUpperCase()

symbols.push(s)
history[s]=[]

document.getElementById("watchlist").innerHTML+=s+"<br>"

}

/* METERS */

function updateMeters(buys,sells){

let total=buys+sells
if(total===0) total=1

let sentiment=Math.round((buys/total)*100)

document.getElementById("sentimentGauge")
.style.setProperty("--value",sentiment+"%")

document.getElementById("sentimentText").innerText=
buys>sells?"Bullish":sells>buys?"Bearish":"Neutral"

document.getElementById("signalGauge")
.style.setProperty("--value",(buys*10)+"%")

document.getElementById("strengthText").innerText=buys

let momentum=buys-sells
let m=Math.min(100,Math.abs(momentum)*20)

document.getElementById("momentumGauge")
.style.setProperty("--value",m+"%")

document.getElementById("momentumText").innerText=momentum

document.getElementById("bullBearGauge")
.style.setProperty("--value",sentiment+"%")

document.getElementById("ratioText").innerText=
`${buys}:${sells}`

}

/* SCANNER */

async function buildScanner(){

let table=document.getElementById("scanner")
table.innerHTML=""

let buy=0
let sell=0

for(let s of symbols){

let price=await getPrice(s)

if(price) history[s].push(price)

if(history[s].length<25) continue

let trend=Math.abs(
ema(history[s].slice(-9),9)-
ema(history[s].slice(-21),21)
).toFixed(2)

let [signal,prob]=aiPrediction(history[s])

if(signal.includes("BUY")) buy++
if(signal.includes("SELL")) sell++

let flows=["Sweep","Block","Split","Momentum"]

let flow=flows[Math.floor(Math.random()*flows.length)]

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${new Date().toLocaleTimeString()}</td>
<td class="symbol" onclick="loadChart('${s}')">${s}</td>
<td>${price?price.toFixed(2):"-"}</td>
<td class="${signal.includes('BUY')?'buy':'sell'}">${signal}</td>
<td class="prob">${prob}</td>
<td>${trend}</td>
<td class="flow">${flow}</td>

`

table.appendChild(tr)

}

updateMeters(buy,sell)

}

/* FLOW TABLE */

function buildFlow(){

let flows=["Sweep","Block","Split"]

let table=document.getElementById("flowTable")

table.innerHTML=""

for(let i=0;i<6;i++){

let s=symbols[Math.floor(Math.random()*symbols.length)]

let size=Math.floor(Math.random()*50000)

let premium="$"+Math.floor(size*2)

table.innerHTML+=`

<tr>
<td>${new Date().toLocaleTimeString()}</td>
<td>${s}</td>
<td>${flows[Math.floor(Math.random()*flows.length)]}</td>
<td>${size}</td>
<td>${premium}</td>
</tr>

`

}

}

/* NEWS */

function news(){

let headlines=[
"Nvidia leads AI rally",
"Tesla volatility spikes",
"Fed policy outlook moves markets",
"Tech sector showing strength",
"Energy stocks reacting to oil"
]

let n=document.getElementById("news")

n.innerHTML="<b>Market News</b>"

headlines.forEach(h=>{

let a=document.createElement("a")
a.innerText="• "+h
n.appendChild(a)

})

}

/* TICKER */

async function updateTicker(){

let t=document.getElementById("ticker")

t.innerHTML=""

for(let s of symbols){

let p=await getPrice(s)

if(!p) continue

let span=document.createElement("span")

span.innerText=`${s} ${p.toFixed(2)}`

t.appendChild(span)

}

}

/* INIT */

news()
updateTicker()
buildScanner()
buildFlow()

setInterval(buildScanner,20000)
setInterval(updateTicker,10000)
setInterval(buildFlow,15000)

</script>

</body>

</html>

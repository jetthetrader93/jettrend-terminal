<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal V2</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{
display:grid;
grid-template-columns:70px 1fr 380px;
grid-template-rows:60px 80px 1fr;
height:100vh;
}

/* sidebar */

.sidebar{
grid-row:1/4;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:20px;
cursor:pointer;
opacity:.7;
}

.sidebar div:hover{
opacity:1;
color:#00ff9c;
}

/* header */

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #333;
}

/* gauges */

.gauges{
grid-column:2/4;
display:flex;
gap:20px;
padding:10px;
background:#111;
}

.gauge{
flex:1;
background:#151515;
border-radius:6px;
padding:10px;
text-align:center;
}

/* layout */

.main{
grid-column:2/3;
padding:15px;
overflow:auto;
}

.right{
grid-column:3/4;
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

/* table */

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
cursor:pointer;
font-weight:bold;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c;font-weight:bold;}
.sell{color:#ff4d4d;font-weight:bold;}
.strongbuy{color:#00ff9c;font-weight:bold;font-size:15px;}
.strongsell{color:#ff3b3b;font-weight:bold;font-size:15px;}

tr:hover{
background:#1a1a1a;
}

/* heatmap */

.heatmap{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-bottom:20px;
}

.heatmap div{
padding:18px;
text-align:center;
border-radius:4px;
font-weight:bold;
}

/* movers */

.movers{
margin-top:20px;
}

.movers div{
padding:8px;
border-bottom:1px solid #222;
}

/* chart */

#chart{
height:420px;
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>⚡</div>
</div>

<div class="topbar">JetTrend AI Terminal</div>

<div class="gauges">

<div class="gauge">
Trend Sentiment
<h2 id="sentiment">Neutral</h2>
</div>

<div class="gauge">
AI Strength
<h2 id="strength">0</h2>
</div>

</div>

<div class="main">

<h3>AI Scanner</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
<th>AI%</th>
<th>Breakout%</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

</div>

<div class="right">

<h3>Sector Heatmap</h3>
<div class="heatmap" id="heatmap"></div>

<h3>Top Gainers</h3>
<div class="movers" id="gainers"></div>

<h3>Top Losers</h3>
<div class="movers" id="losers"></div>

</div>

</div>

<script>

const symbols=[
"AAPL","NVDA","TSLA","AMD","META","MSFT","AMZN","GOOGL","SPY"
]

let history={}
let lastSignal={}

symbols.forEach(s=>history[s]=[])

/* EMA */

function ema(data,p){

if(data.length<p) return null

let k=2/(p+1)
let e=data[data.length-p]

for(let i=data.length-p+1;i<data.length;i++)
e=data[i]*k+e*(1-k)

return e

}

/* SIGNAL ENGINE */

function signalEngine(h){

if(h.length<25) return "NEUTRAL"

let e9=ema(h,9)
let e21=ema(h,21)
let e50=ema(h,50)

if(!e9||!e21||!e50) return "NEUTRAL"

if(e9>e21 && e21>e50) return "STRONG BUY"
if(e9<e21 && e21<e50) return "STRONG SELL"

if(e9>e21) return "BUY"
if(e9<e21) return "SELL"

return "NEUTRAL"

}

/* SENTIMENT */

function updateSentiment(){

let buy=0
let sell=0

Object.values(lastSignal).forEach(s=>{
if(s.includes("BUY")) buy++
if(s.includes("SELL")) sell++
})

let sentiment="Neutral"

if(buy>sell) sentiment="Bullish"
if(sell>buy) sentiment="Bearish"

document.getElementById("sentiment").innerText=sentiment
document.getElementById("strength").innerText=buy-sell

}

/* SCANNER */

function updateScanner(symbol,price){

history[symbol].push(price)

if(history[symbol].length>200)
history[symbol].shift()

let signal=signalEngine(history[symbol])

lastSignal[symbol]=signal

let breakout=Math.floor(Math.random()*100)
let ai=Math.floor(Math.random()*100)

let row=document.getElementById("row_"+symbol)

if(!row){

row=document.createElement("tr")
row.id="row_"+symbol

row.innerHTML=`
<td class="symbol" onclick="loadChart('${symbol}')">${symbol}</td>
<td id="price_${symbol}"></td>
<td id="signal_${symbol}"></td>
<td id="ai_${symbol}"></td>
<td id="break_${symbol}"></td>
`

document.getElementById("scanner").appendChild(row)

}

document.getElementById("price_"+symbol).innerText=price.toFixed(2)

let sig=document.getElementById("signal_"+symbol)

sig.innerText=signal

sig.className=
signal==="BUY"?"buy":
signal==="SELL"?"sell":
signal==="STRONG BUY"?"strongbuy":
signal==="STRONG SELL"?"strongsell":""

document.getElementById("ai_"+symbol).innerText=ai+"%"
document.getElementById("break_"+symbol).innerText=breakout+"%"

updateSentiment()

}

/* populate data */

symbols.forEach(symbol=>{

let price=100+Math.random()*200
updateScanner(symbol,price)

})

/* heatmap */

function buildHeatmap(){

let html=""

symbols.forEach(s=>{

let move=(Math.random()*4-2).toFixed(2)
let color=move>0?"#0a3":"#a00"

html+=`
<div style="background:${color}">
${s}<br>${move}%
</div>
`

})

document.getElementById("heatmap").innerHTML=html

}

buildHeatmap()

/* movers */

function buildMovers(){

let gainers=""
let losers=""

symbols.forEach(s=>{

let move=(Math.random()*6-3).toFixed(2)

let row=`${s} ${move}%`

if(move>0)
gainers+=`<div>${row}</div>`
else
losers+=`<div>${row}</div>`

})

document.getElementById("gainers").innerHTML=gainers
document.getElementById("losers").innerHTML=losers

}

buildMovers()

/* chart */

function loadChart(symbol){

document.getElementById("chart").style.display="block"

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:420

})

}

</script>

</body>
</html>

```html
<!DOCTYPE html>
<html>

<head>

<title>JetTrend Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0a0a0a;
color:white;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:70px;
height:100%;
background:#111;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
}

.sidebar div{
margin:18px 0;
opacity:.6;
cursor:pointer;
font-size:20px;
}

.sidebar div:hover{
opacity:1;
}

/* MAIN AREA */

.main{
margin-left:70px;
padding:15px;
}

/* TOP METRICS */

.metrics{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:12px;
}

.metric{
background:#141414;
padding:15px;
border-radius:5px;
border:1px solid #1e1e1e;
}

.metric h4{
margin:0;
color:#888;
font-weight:400;
}

.metric span{
font-size:22px;
font-weight:600;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
color:#888;
text-align:left;
border-bottom:1px solid #222;
padding:8px;
}

td{
border-bottom:1px solid #1a1a1a;
padding:8px;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c}
.sell{color:#ff4d4d}

/* ALERT PANEL */

.right{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:#111;
padding:15px;
overflow:auto;
}

.alert{
background:#1c1c1c;
padding:8px;
margin-bottom:8px;
border-radius:3px;
}

/* CHART */

#chart{
margin-top:15px;
height:420px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div>📊</div>
<div>🔎</div>
<div>📈</div>
<div>⚡</div>
<div>⚙️</div>

</div>

<!-- ALERTS -->

<div class="right">

<h3>Alerts</h3>

<div id="alerts"></div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<div class="metrics">

<div class="metric">
<h4>Market Sentiment</h4>
<span id="sentiment">Bullish</span>
</div>

<div class="metric">
<h4>Signal Strength</h4>
<span id="strength">0.71</span>
</div>

<div class="metric">
<h4>Market Volume</h4>
<span id="volume">$132B</span>
</div>

<div class="metric">
<h4>Momentum Ratio</h4>
<span id="ratio">0.64</span>
</div>

</div>

<table>

<thead>

<tr>
<th>Time</th>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
<th>Momentum</th>
</tr>

</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

</div>

<script>

const stocks=[
"AAPL",
"NVDA",
"TSLA",
"AMD",
"META"
]

let last={}

async function getPrice(symbol){

const res=await fetch(
`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`
)

const data=await res.json()

return parseFloat(data.price)

}

function addAlert(text){

let div=document.createElement("div")
div.className="alert"
div.innerText=text

document.getElementById("alerts").prepend(div)

}

function signal(price,lastPrice){

if(!lastPrice) return "NEUTRAL"

if(price>lastPrice) return "BUY"

if(price<lastPrice) return "SELL"

return "NEUTRAL"

}

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:420
})

}

async function build(){

let table=document.getElementById("scanner")

table.innerHTML=""

for(let s of stocks){

let price=await getPrice(s)

let tr=document.createElement("tr")

let time=document.createElement("td")
time.innerText=new Date().toLocaleTimeString()

let sym=document.createElement("td")
sym.innerText=s
sym.className="symbol"
sym.onclick=()=>loadChart(s)

let p=document.createElement("td")
p.innerText=price.toFixed(2)

let sig=document.createElement("td")

let sgn=signal(price,last[s])

sig.innerText=sgn

if(sgn==="BUY") sig.className="buy"
if(sgn==="SELL") sig.className="sell"

let mom=document.createElement("td")

let momentum=(Math.random()*100).toFixed(0)+"%"

mom.innerText=momentum

tr.appendChild(time)
tr.appendChild(sym)
tr.appendChild(p)
tr.appendChild(sig)
tr.appendChild(mom)

table.appendChild(tr)

if(last[s] && price!==last[s]){

addAlert(s+" moved to "+price.toFixed(2))

}

last[s]=price

}

}

build()

setInterval(build,20000)

loadChart("AAPL")

</script>

</body>

</html>

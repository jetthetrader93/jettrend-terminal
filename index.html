<!DOCTYPE html>
<html>
<head>

<title>JetTrend AI Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* layout */

.container{
display:grid;
grid-template-columns:70px 1fr 320px;
grid-template-rows:60px 40px 1fr;
height:100vh;
}

.sidebar{
grid-row:1/4;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:18px;
opacity:.7;
}

.sidebar div:hover{
opacity:1;
}

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
font-weight:bold;
border-bottom:1px solid #333;
}

/* ticker tape */

.ticker{
grid-column:2/4;
background:#0f0f0f;
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #333;
}

.ticker span{
display:inline-block;
padding:10px 25px;
color:#00ff9c;
}

/* main */

.main{
padding:15px;
overflow:auto;
}

/* cards */

.cards{
display:flex;
gap:15px;
margin-bottom:15px;
}

.card{
background:#141414;
padding:15px;
border-radius:6px;
flex:1;
}

.card h3{
margin:0;
font-size:14px;
color:#aaa;
}

.card div{
font-size:22px;
margin-top:5px;
}

/* table */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
font-weight:bold;
cursor:pointer;
}

.symbol:hover{
color:#00ff9c;
}

.buy{
color:#00ff9c;
font-weight:bold;
}

.sell{
color:#ff4d4d;
font-weight:bold;
}

.flow{
color:#f0c330;
}

.prob{
color:#7fd3ff;
}

/* right panel */

.right{
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

.panel{
margin-bottom:20px;
}

.panel h3{
margin-top:0;
}

/* alerts */

.alert{
background:#1a1a1a;
padding:10px;
margin-bottom:10px;
border-radius:4px;
}

/* chart */

#chart{
margin-top:20px;
height:500px;
}

.news{
background:#111;
padding:10px;
border-radius:6px;
margin-top:10px;
}

.news a{
color:#00ff9c;
display:block;
margin-bottom:5px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>⚡</div>
<div>⚙️</div>
</div>

<div class="topbar">
JetTrend AI Terminal
</div>

<div class="ticker" id="ticker"></div>

<div class="main">

<div class="cards">

<div class="card">
<h3>Market Sentiment</h3>
<div id="sentiment">Neutral</div>
</div>

<div class="card">
<h3>AI Signal Strength</h3>
<div id="strength">0</div>
</div>

<div class="card">
<h3>Momentum Ratio</h3>
<div id="momentum">0</div>
</div>

</div>

<h3>Flow Scanner</h3>

<table>

<thead>
<tr>
<th>Time</th>
<th>Symbol</th>
<th>Price</th>
<th>AI Signal</th>
<th>Probability</th>
<th>Trend</th>
<th>Flow</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div class="news" id="news">
<b>Market News</b>
</div>

<div id="chart"></div>

</div>

<div class="right">

<div class="panel">
<h3>Top Gainers</h3>
<div id="gainers"></div>
</div>

<div class="panel">
<h3>Top Losers</h3>
<div id="losers"></div>
</div>

<div class="panel">
<h3>Watchlist</h3>

<input id="watchInput" placeholder="Add ticker">
<button onclick="addWatch()">Add</button>

<div id="watchlist"></div>

</div>

<div class="panel">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

</div>

</div>

<script>

/* symbols */

let symbols=["AAPL","NVDA","TSLA","AMD","META"]

let history={}
symbols.forEach(s=>history[s]=[])

/* API */

async function getPrice(symbol){

try{

const res = await fetch(
`https://curly-dream-6189.jetthetrader93.workers.dev/?symbol=${symbol}`
)

const data=await res.json()

if(!data.price) return null

return Number(data.price)

}catch{

return null

}

}

/* EMA */

function ema(data,period){

let k=2/(period+1)
let ema=data[0]

for(let i=1;i<data.length;i++)
ema=data[i]*k+ema*(1-k)

return ema

}

/* chart */

function loadChart(symbol){

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
style:"1",
width:"100%",
height:500

})

}

/* alerts */

function alertMsg(t){

let div=document.createElement("div")
div.className="alert"
div.innerText=t

document.getElementById("alerts").prepend(div)

}

/* ticker tape */

function updateTicker(){

let t=document.getElementById("ticker")

t.innerHTML=""

symbols.forEach(async s=>{

let p=await getPrice(s)

if(!p) return

let span=document.createElement("span")

span.innerText=`${s} ${p.toFixed(2)}`

t.appendChild(span)

})

}

/* news */

function news(){

let headlines=[

"Nvidia leads AI rally",
"Tesla volatility spikes",
"Fed policy outlook moves markets",
"Tech sector showing strength",
"Energy stocks reacting to oil"

]

let n=document.getElementById("news")

n.innerHTML="<b>Market News</b>"

headlines.forEach(h=>{

let a=document.createElement("a")
a.innerText="• "+h
n.appendChild(a)

})

}

/* watchlist */

function addWatch(){

let s=document.getElementById("watchInput").value.toUpperCase()

symbols.push(s)

history[s]=[]

document.getElementById("watchlist").innerHTML+=s+"<br>"

}

/* scanner */

async function buildScanner(){

let table=document.getElementById("scanner")

table.innerHTML=""

let buy=0
let sell=0

for(let s of symbols){

let price=await getPrice(s)

if(price){

history[s].push(price)

}

if(history[s].length<25) continue

let e9=ema(history[s].slice(-9),9)
let e21=ema(history[s].slice(-21),21)

let signal="NEUTRAL"

if(e9>e21){

signal="BUY"
buy++

}

if(e9<e21){

signal="SELL"
sell++

}

let trend=Math.abs(e9-e21).toFixed(2)

let probability=Math.min(95,(Math.abs(e9-e21)*100)).toFixed(0)+"%"

/* institutional flow */

let flow="Block"

if(Math.random()>.7) flow="Sweep"
if(Math.random()>.8) flow="Momentum"
if(Math.random()>.9) flow="Split"

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${new Date().toLocaleTimeString()}</td>

<td class="symbol" onclick="loadChart('${s}')">${s}</td>

<td>${price?price.toFixed(2):"-"}</td>

<td class="${signal=="BUY"?"buy":"sell"}">${signal}</td>

<td class="prob">${probability}</td>

<td>${trend}</td>

<td class="flow">${flow}</td>

`

table.appendChild(tr)

if(signal!="NEUTRAL")

alertMsg(`${s} ${signal} ${probability}`)

}

/* sentiment */

let sentiment="Neutral"

if(buy>sell) sentiment="Bullish"
if(sell>buy) sentiment="Bearish"

document.getElementById("sentiment").innerText=sentiment
document.getElementById("strength").innerText=buy
document.getElementById("momentum").innerText=(buy-sell)

/* gainers losers */

let gain=document.getElementById("gainers")
let lose=document.getElementById("losers")

gain.innerHTML=""
lose.innerHTML=""

symbols.slice(0,3).forEach(s=>{

gain.innerHTML+=`${s}<br>`
lose.innerHTML+=`${s}<br>`

})

}

news()

updateTicker()

buildScanner()

setInterval(buildScanner,20000)

setInterval(updateTicker,10000)

</script>

</body>
</html>

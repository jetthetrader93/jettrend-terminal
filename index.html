```html
<!DOCTYPE html>
<html>

<head>

<title>JetTrend AI Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:70px 1fr 360px;
grid-template-rows:60px 40px 80px 1fr;
height:100vh;
}

.sidebar{
grid-row:1/5;
background:#111;
text-align:center;
padding-top:20px;
}

.sidebar div{
padding:20px;
cursor:pointer;
opacity:.7;
}

.sidebar div:hover{
opacity:1;
color:#00ff9c;
}

.topbar{
grid-column:2/4;
background:#141414;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:1px solid #333;
}

.ticker{
grid-column:2/4;
background:#0f0f0f;
border-bottom:1px solid #222;
}

.ticker span{
padding:10px 20px;
display:inline-block;
color:#00ff9c;
}

.gauges{
grid-column:2/4;
display:flex;
gap:20px;
padding:10px;
background:#111;
}

.gauge{
flex:1;
background:#151515;
border-radius:6px;
padding:10px;
text-align:center;
}

.main{
grid-column:2/3;
padding:15px;
overflow:auto;
}

.right{
grid-column:3/4;
background:#141414;
border-left:1px solid #333;
padding:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:10px;
border-bottom:1px solid #333;
color:#aaa;
}

td{
padding:10px;
border-bottom:1px solid #222;
}

.symbol{
cursor:pointer;
font-weight:bold;
}

.symbol:hover{
color:#00ff9c;
}

.buy{color:#00ff9c}
.sell{color:#ff4d4d}

/* HEATMAP */

.heatmap{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
margin-bottom:20px;
}

.heatmap div{
padding:20px;
text-align:center;
border-radius:4px;
font-weight:bold;
}

/* ALERTS */

#alerts{
position:fixed;
top:20px;
right:20px;
width:260px;
z-index:999;
}

.alert{
background:#121212;
border-left:4px solid #00ff9c;
padding:10px;
margin-bottom:10px;
border-radius:4px;
animation:fade 5s forwards;
}

@keyframes fade{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0}
}

#chart{
height:500px;
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<div id="alerts"></div>

<div class="container">

<div class="sidebar">
<div>📊</div>
<div>🔎</div>
<div>⚡</div>
</div>

<div class="topbar">JetTrend AI Terminal</div>

<div class="ticker" id="ticker"></div>

<div class="gauges">

<div class="gauge">
Trend Sentiment
<h2 id="sentiment">Neutral</h2>
</div>

<div class="gauge">
AI Strength
<h2 id="strength">0</h2>
</div>

</div>

<div class="main">

<h3>AI Scanner</h3>

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Signal</th>
<th>Breakout%</th>
</tr>
</thead>

<tbody id="scanner"></tbody>

</table>

<div id="chart"></div>

</div>

<div class="right">

<h3>Sector Heatmap</h3>
<div class="heatmap" id="heatmap"></div>

<h3>Watchlist</h3>
<div id="watchlist"></div>

</div>

</div>

<script>

/* SYMBOLS */

const symbols = [
"AAPL","NVDA","TSLA","AMD","META","MSFT",
"AMZN","GOOGL","SPY"
]

let history={}
let lastSignal={}

symbols.forEach(s=>history[s]=[])

/* EMA */

function ema(data,period){

if(data.length < period) return null

let k = 2/(period+1)
let ema = data[data.length-period]

for(let i=data.length-period+1;i<data.length;i++){
ema = data[i]*k + ema*(1-k)
}

return ema
}

/* SIGNAL ENGINE */

function signalEngine(h){

if(h.length<30) return "NEUTRAL"

let e9=ema(h,9)
let e21=ema(h,21)
let e120=ema(h,120)

if(!e9 || !e21 || !e120) return "NEUTRAL"

if(e9>e21 && e9>e120) return "BUY"
if(e9<e21 && e9<e120) return "SELL"

return "NEUTRAL"
}

/* SENTIMENT */

function updateSentiment(){

let buy=0
let sell=0

Object.values(lastSignal).forEach(s=>{
if(s==="BUY") buy++
if(s==="SELL") sell++
})

let sentiment="Neutral"

if(buy>sell) sentiment="Bullish"
if(sell>buy) sentiment="Bearish"

document.getElementById("sentiment").innerText=sentiment
document.getElementById("strength").innerText=(buy-sell)
}

/* ALERT */

function alertPopup(symbol,signal){

if(lastSignal[symbol]===signal) return

lastSignal[symbol]=signal

let div=document.createElement("div")

div.className="alert"

div.innerText=`${symbol} ${signal} signal`

document.getElementById("alerts").prepend(div)

updateSentiment()

}

/* UPDATE SCANNER */

function updateScanner(symbol,price){

history[symbol].push(price)

let signal=signalEngine(history[symbol])

if(signal!=="NEUTRAL")
alertPopup(symbol,signal)

let breakout=Math.floor(Math.random()*100)

let row=document.getElementById("row_"+symbol)

if(!row){

row=document.createElement("tr")
row.id="row_"+symbol

row.innerHTML=`
<td class="symbol" onclick="loadChart('${symbol}')">${symbol}</td>
<td id="price_${symbol}"></td>
<td id="signal_${symbol}"></td>
<td id="breakout_${symbol}"></td>
`

document.getElementById("scanner").appendChild(row)

}

document.getElementById("price_"+symbol).innerText=price.toFixed(2)

let sig=document.getElementById("signal_"+symbol)

sig.innerText=signal

sig.className=signal==="BUY"?"buy":signal==="SELL"?"sell":""

document.getElementById("breakout_"+symbol).innerText=breakout+"%"

}

/* WEBSOCKET */

const socket = new WebSocket(
"wss://ws.finnhub.io?token=c3qcq1hr01qgdhqbtk80"
)

socket.onopen = () => {

symbols.forEach(s=>{

socket.send(JSON.stringify({
"type":"subscribe",
"symbol":s
}))

})

}

socket.onmessage = (msg)=>{

let data=JSON.parse(msg.data)

if(!data.data) return

data.data.forEach(t=>{

updateScanner(t.s,t.p)

})

}

/* CHART */

function loadChart(symbol){

document.getElementById("chart").style.display="block"

document.getElementById("chart").innerHTML=""

new TradingView.widget({

container_id:"chart",
symbol:symbol,
interval:"5",
theme:"dark",
width:"100%",
height:500

})

}

/* HEATMAP */

function buildHeatmap(){

let html=""

symbols.slice(0,9).forEach(s=>{

let move=Math.random()*4-2

let color=move>0?"#0a3":"#a00"

html+=`<div style="background:${color}">
${s}<br>${move.toFixed(2)}%
</div>`

})

document.getElementById("heatmap").innerHTML=html

}

buildHeatmap()

</script>

</body>
</html>
